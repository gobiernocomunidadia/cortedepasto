        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-main); color: var(--blanco); margin: 0; min-height: 100vh; }
        
        #map { height: 100%; width: 100%; border-radius: 8px; background-color: #f8fafc; z-index: 10; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #F3F6F9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E6EDF3; border-radius: 4px; }

        /* Ajustes para la ventana de Info de Google Maps */
        .gm-style-iw.gm-style-iw-c {
            border-radius: 8px !important;
            padding: 12px !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06) !important;
        }
        .gm-style-iw-d { overflow: hidden !important; }
        button.gm-ui-hover-effect { display: none !important; }

        /* Estilos del Botón de Cierre Personalizado */
        .custom-close-btn {
            position: absolute;
            right: -4px;
            top: -6px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #94A3B8;
            font-size: 22px;
            font-weight: bold;
            line-height: 1;
            padding: 2px 6px;
            border-radius: 6px;
            transition: all 0.2s ease;
            z-index: 50;
        }
        .custom-close-btn:hover {
            background-color: #F1F5F9;
            color: var(--bg-main);
        }
    </style>
</head>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB2MHti5Cy4IDKPc3Iu0ypNQg_BgsjcMoQ&callback=initMap" defer></script>

    <script>
        let map, infoWindow;
        let infoWindowTimer;
        let cgmLayer;
        let cortesLayer;
        let barridoLayer;
        let coveliaLayer;
        let recoleccionLayer;
        let recorridosLayer; 
        let hidricasLayer; // Capa para Asuntos Hídricos
        let limiteElements = []; 
        const cgmMap = new Map(); // Mapa de CGM normalizado -> Nombre original para evitar duplicados en el select
        let barridoGeoJsonData = null; // Almacenamiento global para los datos de barrido y filtrado dinámico
        let recoleccionGeoJsonData = null; // Almacenamiento global para recolección
        let hidricasGeoJsonData = null; // Almacenamiento global para Asuntos Hídricos

        // --- SISTEMA DIAGNÓSTICO SILENCIOSO ---
        function updateStatus(id, state, extraInfo = '') {
            // Silenciado por solicitud
        }

        // --- CARGADOR DE ARCHIVOS MULTI-RUTA / CASE-INSENSITIVE FALLBACKS ---
        async function loadLayerData(paths, processor, statusId) {
            const noCache = '?v=' + new Date().getTime();
            let success = false;
            let lastError = null;

            for (let path of paths) {
                try {
                    const res = await fetch(path + noCache);
                    if (res.ok) {
                        const json = await res.json();
                        await processor(json);
                        success = true;
                        console.log(`Carga exitosa: ${path}`);
                        break;
                    } else {
                        lastError = `HTTP ${res.status}`;
                    }
                } catch (err) {
                    lastError = err.message;
                }
            }

            if (!success) {
                console.error(`Error crítico cargando de rutas:`, paths, lastError);
                document.getElementById('seccion-local-uploader').classList.remove('hidden');
            }
        }

        // --- FUNCIÓN DE NORMALIZACIÓN DE CGMs ---
        function normalizeCgmName(cgmName) {
            if (!cgmName) return "";
            return cgmName
                .trim()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "") 
                .toUpperCase();
        }

        // --- FUNCIÓN DE BÚSQUEDA DE PROPIEDAD CGM INSENSIBLE A MAYÚSCULAS/MINÚSCULAS ---
        function getFeatureCgmProperty(feature) {
            if (!feature) return "";
            let cgm = feature.getProperty('CGM');
            if (cgm !== undefined && cgm !== null) return String(cgm);
            cgm = feature.getProperty('cgm');
            if (cgm !== undefined && cgm !== null) return String(cgm);
            cgm = feature.getProperty('Cgm');
            if (cgm !== undefined && cgm !== null) return String(cgm);
            
            let found = "";
            if (typeof feature.forEachProperty === 'function') {
                feature.forEachProperty((val, key) => {
                    if (key.toLowerCase() === 'cgm') {
                        found = String(val);
                    }
                });
            }
            return found;
        }

        function getGeoJsonFeatureCgm(f) {
            if (!f || !f.properties) return "";
            if (f.properties.CGM) return f.properties.CGM;
            if (f.properties.cgm) return f.properties.cgm;
            if (f.properties.Cgm) return f.properties.Cgm;
            
            for (let key in f.properties) {
                if (key.toLowerCase() === 'cgm') {
                    return f.properties[key];
                }
            }
            return "";
        }

        // --- FUNCIÓN DE BÚSQUEDA DE PROPIEDAD TURNO INSENSIBLE A MAYÚSCULAS ---
        function getFeatureTurnoProperty(feature) {
            if (!feature) return "";
            let turno = feature.getProperty('TURNO');
            if (turno !== undefined && turno !== null) return String(turno).trim();
            turno = feature.getProperty('turno');
            if (turno !== undefined && turno !== null) return String(turno).trim();
            turno = feature.getProperty('Turno');
            if (turno !== undefined && turno !== null) return String(turno).trim();
            return "";
        }

        // --- FUNCIÓN DE BÚSQUEDA DE PROPIEDAD RUTA INSENSIBLE A MAYÚSCULAS ---
        function getFeatureRutaProperty(feature) {
            if (!feature) return "";
            let ruta = feature.getProperty('Ruta');
            if (ruta !== undefined && ruta !== null) return String(ruta).trim();
            ruta = feature.getProperty('ruta');
            if (ruta !== undefined && ruta !== null) return String(ruta).trim();
            ruta = feature.getProperty('RUTA');
            if (ruta !== undefined && ruta !== null) return String(ruta).trim();
            return "";
        }

        function getGeoJsonFeatureRuta(f) {
            if (!f || !f.properties) return "";
            if (f.properties.Ruta) return String(f.properties.Ruta).trim();
            if (f.properties.ruta) return String(f.properties.ruta).trim();
            if (f.properties.RUTA) return String(f.properties.RUTA).trim();
            return "";
        }

        // --- REGISTRAR CGM DE FORMA ÚNICA ---
        function registerCgm(cgmName) {
            if (!cgmName) return;
            const trimmed = cgmName.trim();
            if (!trimmed) return;
            const normalized = normalizeCgmName(trimmed);
            
            if (!cgmMap.has(normalized)) {
                cgmMap.set(normalized, trimmed);
            } else {
                const existing = cgmMap.get(normalized);
                if (existing === existing.toUpperCase() && trimmed !== trimmed.toUpperCase()) {
                    cgmMap.set(normalized, trimmed);
                }
            }
        }

        // --- PARSEO LITERAL DE FECHAS SEGURO ---
        function parseDateCustom(dateStr) {
            if (!dateStr) return null;
            dateStr = String(dateStr).trim();
            
            // Caso 1: Formato DD/MM/YYYY o D/M/YYYY
            if (dateStr.includes('/')) {
                const parts = dateStr.split('/');
                if (parts.length === 3) {
                    const day = parseInt(parts[0], 10);
                    const month = parseInt(parts[1], 10) - 1; 
                    const year = parseInt(parts[2], 10);
                    if (!isNaN(day) && !isNaN(month) && !isNaN(year)) {
                        return new Date(year, month, day);
                    }
                }
            }
            
            // Caso 2: Formatos de fecha YYYY-MM-DD o ISO con 'T'
            const cleanDateStr = dateStr.split('T')[0];
            const ymdRegex = /^(\d{4})-(\d{2})-(\d{2})$/;
            const ymdMatch = cleanDateStr.match(ymdRegex);
            if (ymdMatch) {
                const year = parseInt(ymdMatch[1], 10);
                const month = parseInt(ymdMatch[2], 10) - 1;
                const day = parseInt(ymdMatch[3], 10);
                if (!isNaN(day) && !isNaN(month) && !isNaN(year)) {
                    return new Date(year, month, day);
                }
            }

            // Caso 3: Formato extendido de zona horaria (ej: "Sat Feb 21 2026...")
            const parts = dateStr.split(/\s+/);
            if (parts.length >= 4) {
                const yearIndex = parts.findIndex(p => /^\d{4}$/.test(p));
                if (yearIndex !== -1) {
                    const year = parseInt(parts[yearIndex], 10);
                    const dayIndex = parts.findIndex((p, idx) => /^\d{1,2}$/.test(p) && idx !== yearIndex);
                    if (dayIndex !== -1) {
                        const day = parseInt(parts[dayIndex], 10);
                        const monthsMap = {
                            jan: 0, feb: 1, mar: 2, apr: 3, may: 4, jun: 5, jul: 6, aug: 7, sep: 8, oct: 9, nov: 10, dec: 11,
                            ene: 0, abr: 3, ago: 7, dic: 11
                        };
                        let month = -1;
                        for (let p of parts) {
                            const cleanP = p.toLowerCase().substring(0, 3);
                            if (monthsMap[cleanP] !== undefined) {
                                month = monthsMap[cleanP];
                                break;
                            }
                        }
                        if (month !== -1 && !isNaN(day) && !isNaN(year)) {
                            return new Date(year, month, day);
                        }
                    }
                }
            }
            
            // Fallback robusto garantizado a Date
            const d = new Date(dateStr);
            if (!isNaN(d.getTime())) {
                return new Date(d.getFullYear(), d.getMonth(), d.getDate());
            }
            return null;
        }

        function formatDateToShow(dateStr) {
            if (!dateStr) return '-';
            const parsed = parseDateCustom(dateStr);
            if (!parsed) return dateStr;
            const day = String(parsed.getDate()).padStart(2, '0');
            const month = String(parsed.getMonth() + 1).padStart(2, '0');
            const year = parsed.getFullYear();
            return `${day}/${month}/${year}`;
        }
        
        // --- FUNCIÓN DE COLORES POR DÍA (GAMA AZULES CORPORATIVOS) ---
        function getColorPorDiaSemana(fechaStr) {
            const parsed = parseDateCustom(fechaStr);
            if (!parsed) return '#19567C'; 
            
            const diaSemana = parsed.getDay(); 
            
            const coloresAzul = {
                1: '#03045E', // Lunes
                2: '#023E8A', // Martes
                3: '#0077B6', // Miércoles
                4: '#0096C7', // Jueves
                5: '#00B4D8', // Viernes
                6: '#48CAE4', // Sábado
                0: '#90E0EF'  // Domingo
            };
            return coloresAzul[diaSemana] || '#19567C';
        }

        // --- CONVERTIDOR DE HSL A HEXADECIMAL ---
        function hslToHex(h, s, l) {
            l /= 100;
            const a = s * Math.min(l, 1 - l) / 100;
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`;
        }

        // --- GENERADOR DETERMINISTA DE 63 TONALIDADES DE VERDE ---
        function getColorForRoute(ruta) {
            if (!ruta) return '#10B981'; 
            let hash = 0;
            const str = String(ruta);
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            hash = Math.abs(hash);
            
            const h = 85 + (hash % 71); 
            const s = 55 + (hash % 41);
            const l = 33 + (hash % 26);
            return hslToHex(h, s, l);
        }

        // --- GAMA DE VERDES CORPORATIVOS POR TIPO DE TURNO PARA RECOLECCIÓN (MAÑANA, NOCHE, FERIAS) ---
        function getRecoleccionColor(turno) {
            if (!turno) return '#15803D'; // Verde esmeralda por defecto
            const cleanTurno = turno.trim().toUpperCase();
            
            if (cleanTurno.includes('MAÑANA') || cleanTurno.includes('DIA')) {
                return '#22C55E'; // Verde Brillante / Mañana (Green-500)
            } else if (cleanTurno.includes('NOCHE')) {
                return '#166534'; // Verde Bosque Profundo / Noche (Green-800)
            } else if (cleanTurno.includes('FERIA')) {
                return '#84CC16'; // Verde Limón Ecológico / Ferias (Lime-500)
            }
            return '#15803D'; // Verde corporativo estándar
        }

        // --- LIMPIEZA DE GEOJSON DAÑADO Y RECONSTRUCCIÓN DEFENSIVA ---
        function sanitizeGeoJson(geoJson) {
            if (!geoJson || !geoJson.features) return geoJson;
            
            const sanitizedFeatures = geoJson.features.map(feature => {
                if (!feature.geometry || !feature.geometry.coordinates) return feature;
                
                const type = feature.geometry.type;
                const coords = feature.geometry.coordinates;
                
                try {
                    if (type === 'Point') {
                        if (!Array.isArray(coords) || coords.length < 2 || coords[0] === null || coords[1] === null || isNaN(coords[0]) || isNaN(coords[1])) {
                            feature.geometry = null;
                        }
                    } else if (type === 'LineString' || type === 'MultiPoint') {
                        if (Array.isArray(coords)) {
                            const clean = coords.filter(c => Array.isArray(c) && c.length >= 2 && c[0] !== null && c[1] !== null && !isNaN(c[0]) && !isNaN(c[1]));
                            if (clean.length >= 2) {
                                feature.geometry.coordinates = clean;
                            } else if (clean.length === 1) {
                                feature.geometry.type = 'Point';
                                feature.geometry.coordinates = clean[0];
                            } else {
                                feature.geometry = null;
                            }
                        } else {
                            feature.geometry = null;
                        }
                    } else if (type === 'Polygon' || type === 'MultiLineString') {
                        if (Array.isArray(coords)) {
                            const cleanRings = coords.map(ring => {
                                if (!Array.isArray(ring)) return [];
                                return ring.filter(c => Array.isArray(c) && c.length >= 2 && c[0] !== null && c[1] !== null && !isNaN(c[0]) && !isNaN(c[1]));
                            }).filter(ring => ring.length > 0);
                            
                            if (cleanRings.length > 0) {
                                const mainRing = cleanRings[0];
                                if (mainRing.length >= 3 && type === 'Polygon') {
                                    feature.geometry.coordinates = cleanRings;
                                } else if (mainRing.length >= 2) {
                                    feature.geometry.type = 'LineString';
                                    feature.geometry.coordinates = mainRing;
                                } else if (mainRing.length === 1) {
                                    feature.geometry.type = 'Point';
                                    feature.geometry.coordinates = mainRing[0];
                                } else {
                                    feature.geometry = null;
                                }
                            } else {
                                feature.geometry = null;
                            }
                        } else {
                            feature.geometry = null;
                        }
                    } else if (type === 'MultiPolygon') {
                        if (Array.isArray(coords)) {
                            const cleanPolys = coords.map(poly => {
                                if (!Array.isArray(poly)) return [];
                                return poly.map(ring => {
                                    if (!Array.isArray(ring)) return [];
                                    return ring.filter(c => Array.isArray(c) && c.length >= 2 && c[0] !== null && c[1] !== null && !isNaN(c[0]) && !isNaN(c[1]));
                                }).filter(ring => ring.length > 0);
                            }).filter(poly => poly.length > 0);
                            
                            if (cleanPolys.length > 0) {
                                feature.geometry.coordinates = cleanPolys;
                            } else {
                                feature.geometry = null;
                            }
                        } else {
                            feature.geometry = null;
                        }
                    }
                } catch (err) {
                    console.error("Error sanitizando geometría:", err);
                    feature.geometry = null;
                }
                return feature;
            }).filter(f => f.geometry !== null && f.geometry !== undefined);

            return {
                ...geoJson,
                features: sanitizedFeatures
            };
        }

            // Intentar cargar primero el archivo comprimido .gz utilizando la librería pako con autodetección
            async function loadRecorridosData() {
                const paths = [
                    { path: './covelia_mensual_polylines.geojson.gz', isGz: true },
                    { path: './covelia_mensual_polylines.geojson', isGz: false }
                ];
                let success = false;
                let lastError = null;

                for (let item of paths) {
                    try {
                        const res = await fetch(item.path + noCache);
                        if (!res.ok) {
                            lastError = `HTTP ${res.status}`;
                            continue;
                        }

                        if (item.isGz) {
                            const buffer = await res.arrayBuffer();
                            const decoder = new TextDecoder('utf-8');
                            let geoJson = null;
                            try {
                                const text = decoder.decode(buffer);
                                if (text.trim().startsWith('{')) {
                                    geoJson = JSON.parse(text);
                                }
                            } catch (e) {
                                // Es un binario GZIP real
                            }

                            if (!geoJson) {
                                if (typeof pako !== 'undefined') {
                                    const decompressed = pako.ungzip(new Uint8Array(buffer), { to: 'string' });
                                    geoJson = JSON.parse(decompressed);
                                } else {
                                    throw new Error("Librería Pako ausente");
                                }
                            }
                            procesarRecorridos(geoJson);
                            success = true;
                            break;
                        } else {
                            const geoJson = await res.json();
                            procesarRecorridos(geoJson);
                            success = true;
                            break;
                        }
                    } catch (err) {
                        lastError = err.message;
                    }
                }

                if (!success) {
                    console.error("Fallo total al cargar recorridos:", lastError);
                    document.getElementById('seccion-local-uploader').classList.remove('hidden');
                }
            }
            loadRecorridosData();

            // Se sincroniza con el estado inicial del checkbox (desmarcado por defecto)
            recorridosLayer.setMap(document.getElementById('cb-recorridos').checked ? map : null);


            // 8. Cargar Asuntos Hídricos GeoJSON (Inicia deseleccionado)

            const procesarHidricas = (geoJson) => {
                const featuresToRemove = [];
                hidricasLayer.forEach(feat => featuresToRemove.push(feat));
                featuresToRemove.forEach(feat => hidricasLayer.remove(feat));

                const sanitized = sanitizeGeoJson(geoJson);
                hidricasLayer.addGeoJson(sanitized);

                hidricasGeoJsonData = geoJson;

                const tiposSet = new Set();
                const tareasSet = new Set();
                const fechasHidricasSet = new Set();

                geoJson.features.forEach(f => {
                    if (f.properties) {
                        if (f.properties.tipo) {
                            tiposSet.add(String(f.properties.tipo).trim());
                        }
                        if (f.properties.tarea) {
                            tareasSet.add(String(f.properties.tarea).trim());
                        }
                        if (f.properties.fecha) {
                            const formatted = formatDateToShow(f.properties.fecha);
                            if (formatted && formatted !== "-") {
                                fechasHidricasSet.add(formatted);
                            }

                        const cgmValue = getGeoJsonFeatureCgm(f);

                // Llenar selector de Fecha de Asuntos Hídricos

                    const selectedVal = selectFechaHidricas.value;

                    const sortedFechas = Array.from(fechasHidricasSet).sort((a, b) => {

            // --- EVENTO DE CARGA DE ARCHIVO MANUAL INTELIGENTE ---
            const loadGeoJsonData = (geoJson) => {
                const name = (geoJson.name || "").toLowerCase();
                const isCgm = name.includes("cgm") || geoJson.features.some(f => f.geometry && (f.geometry.type === 'Polygon' || f.geometry.type === 'MultiPolygon') && !f.properties.Fecha_str && !f.properties.BARRENDERO && !f.properties.Ruta && !f.properties.RUTA && !f.properties.Dominio);
                const isBarrido = name.includes("barrendero") || name.includes("barrido.geojson") || geoJson.features.some(f => f.properties && f.properties.BARRENDERO);
                const isCovelia = name.includes("covelia") || name.includes("barrido") || geoJson.features.some(f => f.properties && f.properties.Ruta && !f.properties.Dominio);
                const isRecoleccion = name.includes("recoleccion") || geoJson.features.some(f => f.properties && f.properties.RUTA);
                const isRecorridos = name.includes("recorridos") || name.includes("polylines") || geoJson.features.some(f => f.properties && f.properties.Dominio);
                const isHidricas = name.includes("hidrica") || name.includes("acuatico") || geoJson.features.some(f => f.properties && (f.properties.tipo || f.properties.tarea) && !f.properties.BARRENDERO && !f.properties.Dominio);
                
                if (isCgm) {
                    const featuresToRemoveCgm = [];
                    cgmLayer.forEach(feat => featuresToRemoveCgm.push(feat));
                    featuresToRemoveCgm.forEach(feat => cgmLayer.remove(feat));

                    cgmLayer.addGeoJson(geoJson);
                    geoJson.features.forEach(f => {
                        const cgmValue = getGeoJsonFeatureCgm(f);
                        if (cgmValue) registerCgm(cgmValue);
                    });
                    updateCgmDropdown();
                    updateStyles();
                } else if (isBarrido) {
                    procesarBarrido(geoJson);
                } else if (isCovelia) {
                    procesarCovelia(geoJson);
                } else if (isRecoleccion) {
                    procesarRecoleccion(geoJson);
                } else if (isRecorridos) {
                    procesarRecorridos(geoJson);
                } else if (isHidricas) {
                    procesarHidricas(geoJson);
                } else {
                    procesarCortes(geoJson);
                }
            };

            document.getElementById('input-geojson-local').addEventListener('change', function(e) {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    const lowerName = file.name.toLowerCase();
                    
                    if (lowerName.endsWith('.gz')) {
                        reader.onload = function(evt) {
                            try {
                                if (typeof pako !== 'undefined') {
                                    const arrayBuffer = evt.target.result;
                                    const decompressed = pako.ungzip(new Uint8Array(arrayBuffer), { to: 'string' });
                                    const geoJson = JSON.parse(decompressed);
                                    loadGeoJsonData(geoJson);
                                    console.log("Archivo comprimido .gz local cargado y descomprimido con éxito.");
                                } else {
                                    console.error("Librería Pako no está cargada. No se pudo descomprimir el archivo GZ local.");
                                }
                            } catch(err) {
                                console.error("Error al descomprimir el archivo .gz cargado localmente:", err);
                            }
                        };
                        reader.readAsArrayBuffer(file);
                    } else {
                        reader.onload = function(evt) {
                            try {
                                const rawText = evt.target.result;
                                const geoJson = JSON.parse(rawText);
                                loadGeoJsonData(geoJson);
                            } catch(err) {
                                console.error("Error al parsear el archivo cargado:", err);
                            }
                        };
                        reader.readAsText(file);
                    }
                });
            });

                            content += `<h3 style="font-weight: 800; font-size: 14px; color: ${colorDin}; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">${tipoLabel}</h3>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Nombre:</b> ${nombreRaw}</p>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Fecha:</b> ${fechaCorteClean}</p>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${getFeatureCgmProperty(event.feature) || '-'}</p>`;
                            
                            const localidad = event.feature.getProperty('Localidad');
                            if (localidad) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Localidad:</b> ${localidad}</p>`;
                            }
                            const ubicacion = event.feature.getProperty('UBICACION') || event.feature.getProperty('DIRECCION');
                            if (ubicacion) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Ubicación:</b> ${ubicacion}</p>`;
                            }
                        } else {
                            content += `<h3 style="font-weight: 800; font-size: 14px; color: ${dynamicDayColor}; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">Recorrido de Corte</h3>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Fecha:</b> ${fechaCorteClean}</p>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${getFeatureCgmProperty(event.feature) || '-'}</p>`;
                            
                            const localidad = event.feature.getProperty('Localidad');
                            if (localidad) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Localidad:</b> ${localidad}</p>`;
                            }
                            if(event.feature.getProperty('Inicio Recorrido')) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Inicio:</b> ${event.feature.getProperty('Inicio Recorrido')}</p>`;
                            }
                            if(event.feature.getProperty('Fin del Recorrido')) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Fin:</b> ${event.feature.getProperty('Fin del Recorrido')}</p>`;
                            }
                            
                            const distancia = event.feature.getProperty('Distancia');
                            if(distancia && distancia > 0) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Distancia:</b> ${distancia} m</p>`;
                            }
                            const area = event.feature.getProperty('Area');
                            if(area && area > 0) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Área:</b> ${area} m²</p>`;
                            }
                        }
                    } else if (layerType === 'barrido') {
                        content += `<h3 style="font-weight: 800; font-size: 14px; color: var(--color-barrido); border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">Barrido</h3>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Calle:</b> ${event.feature.getProperty('CALLE') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Barrendero:</b> ${event.feature.getProperty('BARRENDERO') || '-'}</p>`;
                        
                        const legajo = event.feature.getProperty('LEGAJO/DNI');
                        if (legajo !== undefined && legajo !== null && legajo !== "") {
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Legajo:</b> ${legajo}</p>`;
                        }
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${getFeatureCgmProperty(event.feature) || '-'}</p>`;

                    } else if (layerType === 'covelia') {
                        const ruta = event.feature.getProperty('Ruta') || event.feature.getProperty('ruta') || event.feature.getProperty('RUTA') || '-';
                        const dynamicGreen = getColorForRoute(ruta);
                        content += `<h3 style="font-weight: 800; font-size: 14px; color: ${dynamicGreen}; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">Barrido Covelia - Ruta ${ruta}</h3>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${getFeatureCgmProperty(event.feature) || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Turno:</b> ${event.feature.getProperty('Turno') || event.feature.getProperty('turno') || event.feature.getProperty('TURNO') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Frecuencia:</b> ${event.feature.getProperty('Frecuencia') || event.feature.getProperty('frecuencia') || event.feature.getProperty('FRECUENCIA') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Horario:</b> ${event.feature.getProperty('Horario') || event.feature.getProperty('horario') || event.feature.getProperty('HORARIO') || '-'}</p>`;
                        const metros = event.feature.getProperty('Metros') || event.feature.getProperty('metros') || event.feature.getProperty('METROS');
                        if (metros) {
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Extensión:</b> ${metros} m</p>`;
                        }
                    } else if (layerType === 'recoleccion') {
                        const ruta = event.feature.getProperty('RUTA') || '-';
                        const featTurno = getFeatureTurnoProperty(event.feature);
                        const dynamicTurnoColor = getRecoleccionColor(featTurno);
                        
                        content += `<h3 style="font-weight: 800; font-size: 14px; color: ${dynamicTurnoColor}; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">Recolección Covelia - Ruta ${ruta}</h3>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Frecuencia semanal:</b> ${event.feature.getProperty('FRECUENCIA') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Turno:</b> ${featTurno || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Horario:</b> ${event.feature.getProperty('INICIO_T') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Días:</b> ${event.feature.getProperty('DIAS') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Zona interna:</b> ${event.feature.getProperty('ZONA') || '-'}</p>`;
                        const cgmVal = getFeatureCgmProperty(event.feature);
                        if (cgmVal) {
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${cgmVal}</p>`;
                        }
                    } else if (layerType === 'recorridos') {
                        const dominio = event.feature.getProperty('Dominio') || '-';
                        const dynamicColor = getColorForRoute(dominio);
                        const fechaOriginal = event.feature.getProperty('Fecha');
                        const fechaClean = formatDateToShow(fechaOriginal);
                        const puntos = event.feature.getProperty('n_puntos') || '-';
                        const ruta = getFeatureRutaProperty(event.feature);

                        content += `<h3 style="font-weight: 800; font-size: 14px; color: ${dynamicColor}; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">Recorrido Covelia</h3>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Dominio:</b> ${dominio}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Fecha:</b> ${fechaClean}</p>`;
                        if (ruta) {
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Ruta:</b> ${ruta}</p>`;
                        }
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Puntos Registrados:</b> ${puntos}</p>`;
                    } else if (layerType === 'hidricas') {
                        const tipo = event.feature.getProperty('tipo') || 'Elemento Hídrico';
                        const tarea = event.feature.getProperty('tarea') || '-';
                        const fechaRaw = event.feature.getProperty('fecha');
                        const fechaClean = formatDateToShow(fechaRaw);

                        content += `<h3 style="font-weight: 800; font-size: 14px; color: var(--color-hidricas); border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">Asuntos Hídricos</h3>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Tipo:</b> ${tipo}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Tarea:</b> ${tarea}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Fecha:</b> ${fechaClean}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${getFeatureCgmProperty(event.feature) || '-'}</p>`;

                        const dirDesde = event.feature.getProperty('direccion_desde');
                        const dirHasta = event.feature.getProperty('direccion_hasta');
                        if (dirDesde) {
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Dirección:</b> ${dirDesde}${dirHasta ? ' hasta ' + dirHasta : ''}</p>`;
                        }

                        const cant = event.feature.getProperty('cant');
                        if (cant !== undefined && cant !== null && cant !== "") {
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Cantidad:</b> ${cant}</p>`;
                        }

                        const obs = event.feature.getProperty('observaciones');
                        if (obs) {
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Obs:</b> ${obs}</p>`;
                        }
                    } else { // CGM
                        content += `<h3 style="font-weight: 800; font-size: 14px; color: ${colorTitle}; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">CGM: ${getFeatureCgmProperty(event.feature)}</h3>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Manzanas:</b> ${event.feature.getProperty('Manzanas') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Cuadras:</b> ${event.feature.getProperty('Cuadras') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Viviendas:</b> ${event.feature.getProperty('Viviendas') || '-'}</p>`;
                    }
                    content += `</div>`;
                    
                    infoWindow.setContent(content);
                    if (event.feature.getGeometry().getType() === 'Point') {
                        infoWindow.setPosition(event.feature.getGeometry().get());
                    } else {
                        infoWindow.setPosition(event.latLng);
                    }
                    infoWindow.open(map);
                    startInfoWindowTimer(); 
                });
            }

            bindPopup(cgmLayer, '#2A7E43', 'cgm');
            bindPopup(cortesLayer, '#19567C', 'corte');
            bindPopup(barridoLayer, 'var(--color-barrido)', 'barrido');
            bindPopup(coveliaLayer, 'var(--color-covelia)', 'covelia');
            bindPopup(recoleccionLayer, 'var(--color-recoleccion)', 'recoleccion');
            bindPopup(recorridosLayer, 'var(--color-covelia)', 'recorridos');
            bindPopup(hidricasLayer, 'var(--color-hidricas)', 'hidricas');

            // Toggles de Capas
            document.getElementById('cb-limite').addEventListener('change', (e) => {
                const m = e.target.checked ? map : null;
                limiteElements.forEach(el => el.setMap(m));
            });

            document.getElementById('cb-cgm').addEventListener('change', (e) => {
                e.target.checked ? cgmLayer.setMap(map) : cgmLayer.setMap(null);
            });

            document.getElementById('cb-cortes').addEventListener('change', (e) => {
                e.target.checked ? cortesLayer.setMap(map) : cortesLayer.setMap(null);
            });

            document.getElementById('cb-barrido').addEventListener('change', (e) => {
                e.target.checked ? barridoLayer.setMap(map) : barridoLayer.setMap(null);
            });

            document.getElementById('cb-covelia').addEventListener('change', (e) => {
                e.target.checked ? coveliaLayer.setMap(map) : coveliaLayer.setMap(null);
            });

            document.getElementById('cb-recoleccion').addEventListener('change', (e) => {
                e.target.checked ? recoleccionLayer.setMap(map) : recoleccionLayer.setMap(null);
            });

            document.getElementById('cb-recorridos').addEventListener('change', (e) => {
                e.target.checked ? recorridosLayer.setMap(map) : recorridosLayer.setMap(null);
            });

            document.getElementById('cb-hidricas').addEventListener('change', (e) => {
                e.target.checked ? hidricasLayer.setMap(map) : hidricasLayer.setMap(null);
            });
        }
    </script>
</body>
</html>
