<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corte de Pasto - Lomas de Zamora</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fuentes e Íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-main: #2A7E43; 
            --blanco: #FFFFFF;
            --acento: #7ED957;
            --azul-inst: #19567C;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-main); color: var(--blanco); margin: 0; min-height: 100vh; }
        
        #map { height: 100%; width: 100%; border-radius: 8px; background-color: #f8fafc; z-index: 10; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #F3F6F9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E6EDF3; border-radius: 4px; }

        /* Ajustes para la ventana de Info de Google Maps */
        .gm-style-iw.gm-style-iw-c {
            border-radius: 8px !important;
            padding: 12px !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06) !important;
        }
        .gm-style-iw-d { overflow: hidden !important; }
        button.gm-ui-hover-effect { display: none !important; }

        /* Estilos del Botón de Cierre Personalizado */
        .custom-close-btn {
            position: absolute;
            right: -4px;
            top: -6px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #94A3B8;
            font-size: 22px;
            font-weight: bold;
            line-height: 1;
            padding: 2px 6px;
            border-radius: 6px;
            transition: all 0.2s ease;
            z-index: 50;
        }
        .custom-close-btn:hover {
            background-color: #F1F5F9;
            color: var(--bg-main);
        }
    </style>
</head>
<body class="flex flex-col">

    <header class="bg-[var(--bg-main)] shadow-lg border-b-4 border-[var(--acento)] z-20 py-6 px-4 shrink-0">
        <div class="max-w-[1600px] mx-auto flex items-center justify-center gap-4">
            <div class="bg-white text-[var(--bg-main)] rounded-full h-14 w-14 flex items-center justify-center shadow-md">
                <i class="fa-solid fa-leaf text-2xl"></i>
            </div>
            <div class="flex flex-col">
                <h1 class="text-3xl font-extrabold tracking-tight uppercase leading-none">Corte de Pasto</h1>
            </div>
        </div>
    </header>

    <main class="w-full max-w-[1600px] mx-auto py-8 px-4 flex-1 flex flex-col lg:flex-row gap-6">
        
        <aside class="w-full lg:w-80 bg-white rounded-xl shadow-md border border-[#E6EDF3] flex flex-col max-h-[calc(100vh-200px)] overflow-hidden shrink-0 z-20">
            <div class="p-4 border-b bg-[#F3F6F9] flex items-center gap-2">
                <i data-lucide="filter" class="text-[var(--bg-main)] h-5 w-5"></i>
                <h3 class="font-bold text-[#0F172A] uppercase text-sm">Filtros Operativos</h3>
            </div>
            
            <div class="p-5 overflow-y-auto custom-scrollbar flex-1 space-y-6">
                
                <!-- SECCIÓN: FILTRO GLOBAL -->
                <div class="bg-[var(--bg-main)]/10 p-3 rounded-lg border border-[var(--bg-main)]/30 shadow-sm">
                    <h4 class="text-xs font-extrabold text-[var(--bg-main)] uppercase mb-2 flex items-center gap-2">
                        <i data-lucide="crosshair" class="h-4 w-4"></i> Filtro Global de Zona
                    </h4>
                    <select id="filtro-global-cgm" class="w-full text-xs p-2 border border-[var(--bg-main)]/30 rounded focus:outline-none focus:border-[var(--bg-main)] font-semibold text-[#0F172A] cursor-pointer">
                        <option value="TODOS">TODOS LOS CGM</option>
                        <!-- Se llena dinámicamente -->
                    </select>
                </div>

                <!-- SECCIÓN: DIVISIÓN TERRITORIAL -->
                <div class="bg-[var(--bg-main)]/10 p-3 rounded-lg border border-[var(--bg-main)]/30">
                    <h4 class="text-xs font-extrabold text-[var(--bg-main)] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="map" class="h-4 w-4"></i> División Territorial
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-limite" checked class="w-4 h-4 accent-[var(--bg-main)]">
                            <span class="text-sm text-[#0F172A] font-bold">Límite Lomas de Zamora</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-cgm" checked class="w-4 h-4 accent-[var(--bg-main)]">
                            <span class="text-sm text-[#0F172A] font-bold">División por CGM</span>
                        </label>
                    </div>
                </div>

                <!-- SECCIÓN: CORTES DE PASTO -->
                <div class="bg-[var(--bg-main)]/10 p-3 rounded-lg border border-[var(--bg-main)]/30">
                    <h4 class="text-xs font-extrabold text-[var(--bg-main)] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="scissors" class="h-4 w-4"></i> Cortes de Pasto
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-cortes" checked class="w-4 h-4 accent-[var(--bg-main)]">
                            <span class="text-sm text-[#0F172A] font-bold">Ver Cortes de Pasto</span>
                        </label>
                        <div class="flex flex-col gap-1 mt-2 pl-7">
                            <label class="text-xs font-semibold text-gray-600">Filtrar por Fecha:</label>
                            <select id="filtro-fecha" class="w-full text-xs p-1.5 border border-gray-300 rounded focus:outline-none focus:border-[var(--bg-main)] font-semibold text-[#0F172A] cursor-pointer">
                                <option value="TODAS">TODAS LAS FECHAS</option>
                                <!-- Se llena dinámicamente -->
                            </select>
                        </div>
                    </div>
                </div>

            </div>
        </aside>

        <div class="flex-1 bg-white p-2 rounded-xl shadow-lg border border-[#E6EDF3] flex flex-col min-h-[500px] relative z-10">
            <div id="map"></div>
        </div>

    </main>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB2MHti5Cy4IDKPc3Iu0ypNQg_BgsjcMoQ&callback=initMap" defer></script>

    <script>
        let map, infoWindow;
        let infoWindowTimer;
        let cgmLayer;
        let cortesLayer;
        let limiteElements = []; 
        const cgmSet = new Set(); // Repositorio global de CGMs detectados

        // --- FUNCIÓN DE NORMALIZACIÓN DE CGMs (Evita fallos por trailing spaces, acentos o mayúsculas/minúsculas) ---
        function normalizeCgmName(cgmName) {
            if (!cgmName) return "";
            return cgmName
                .trim()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "") // Elimina acentos/tildes de forma segura
                .toUpperCase();
        }

        // --- FUNCIONES DE NORMALIZACIÓN Y PARSEO DE FECHAS SEGURO ---
        function parseDateCustom(dateStr) {
            if (!dateStr) return new Date(NaN);
            dateStr = dateStr.trim();
            
            // Caso 1: Formato DD/MM/YYYY o D/M/YYYY
            const dmyRegex = /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/;
            const dmyMatch = dateStr.match(dmyRegex);
            if (dmyMatch) {
                const day = parseInt(dmyMatch[1], 10);
                const month = parseInt(dmyMatch[2], 10) - 1; 
                const year = parseInt(dmyMatch[3], 10);
                return new Date(year, month, day);
            }
            
            // Caso 2: Formatos de cadena de texto (ej: "Sat Feb 21 2026 ...")
            const wordRegex = /^[A-Za-z]{3}\s+([A-Za-z]{3})\s+(\d{1,2})\s+(\d{4})/;
            const wordMatch = dateStr.match(wordRegex);
            if (wordMatch) {
                const monthStr = wordMatch[1];
                const day = parseInt(wordMatch[2], 10);
                const year = parseInt(wordMatch[3], 10);
                
                const months = {
                    Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5,
                    Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11
                };
                const month = months[monthStr] !== undefined ? months[monthStr] : 0;
                return new Date(year, month, day);
            }
            
            // Fallback eliminando los paréntesis molestos
            const cleanStr = dateStr.replace(/\s*\(.*\)\s*/, '').trim();
            return new Date(cleanStr);
        }

        function formatDateToShow(dateStr) {
            if (!dateStr) return '-';
            const d = parseDateCustom(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }
        
        // --- FUNCIÓN DE COLORES POR DÍA (GAMA AZULES CORPORATIVOS) ---
        function getColorPorDiaSemana(fechaStr) {
            const fechaObj = parseDateCustom(fechaStr);
            if (isNaN(fechaObj.getTime())) return '#19567C'; 
            
            const diaSemana = fechaObj.getDay(); 
            const coloresAzul = {
                1: '#03045E', // Lunes - Azul Marino Oscuro
                2: '#023E8A', // Martes - Azul Fuerte
                3: '#0077B6', // Miércoles - Azul Medio
                4: '#0096C7', // Jueves - Azul Celeste Oscuro
                5: '#00B4D8', // Viernes - Celeste
                6: '#48CAE4', // Sábado - Celeste Claro
                0: '#90E0EF'  // Domingo - Cyan Muy Claro
            };
            
            return coloresAzul[diaSemana] || '#19567C';
        }

        // --- GENERADOR DE ICONOS INTELIGENTE (PLAZAS/ESCUELAS/PREDIOS) ---
        function getCustomIcon(type, strokeColor = '#FFFFFF') {
            let bgColor, letter;
            if (type === 'ESCUELA') {
                bgColor = '#F59E0B'; // Naranja
                letter = 'E';
            } else if (type === 'POLIDEPORTIVO') {
                bgColor = '#0EA5E9'; // Celeste
                letter = 'D'; // Deportes / Predios / DOTA
            } else {
                bgColor = '#84CC16'; // Verde Lima
                letter = 'P'; // Plaza/Parque
            }
            
            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
                    <circle cx="12" cy="12" r="10" fill="${bgColor}" stroke="${strokeColor}" stroke-width="3"/>
                    <text x="12" y="16" font-family="Montserrat, sans-serif" font-weight="bold" font-size="11" fill="#FFFFFF" text-anchor="middle">${letter}</text>
                </svg>
            `;
            return {
                url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
                scaledSize: new google.maps.Size(24, 24),
                anchor: new google.maps.Point(12, 12)
            };
        }

        // --- ACTUALIZACIÓN DINÁMICA DEL SELECTOR DE CGMs ---
        function updateCgmDropdown() {
            const selectGlobalCgm = document.getElementById('filtro-global-cgm');
            const selectedVal = selectGlobalCgm.value;
            
            selectGlobalCgm.innerHTML = '<option value="TODOS">TODOS LOS CGM</option>';
            
            const sortedCgms = Array.from(cgmSet).sort();
            sortedCgms.forEach(cgmName => {
                if (cgmName) {
                    const opt = document.createElement('option');
                    opt.value = normalizeCgmName(cgmName);
                    // Formatea estéticamente (Ej: "Santa Catalina" o "Lomas")
                    const formattedName = cgmName.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
                    opt.textContent = formattedName;
                    selectGlobalCgm.appendChild(opt);
                }
            });
            
            // Mantiene el filtro seleccionado previamente si todavía existe
            selectGlobalCgm.value = selectedVal;
        }

        function startInfoWindowTimer() {
            if (infoWindowTimer) clearTimeout(infoWindowTimer);
            infoWindowTimer = setTimeout(() => {
                if (infoWindow) infoWindow.close();
            }, 10000); 
        }

        window.closeInfoWindow = function() {
            if (infoWindow) {
                infoWindow.close();
            }
            if (infoWindowTimer) {
                clearTimeout(infoWindowTimer);
            }
        };

        function initMap() {
            lucide.createIcons();
            infoWindow = new google.maps.InfoWindow();
            
            google.maps.event.addListener(infoWindow, 'domready', () => {
                const iwContainer = document.querySelector('.gm-style-iw-c');
                if (iwContainer) {
                    iwContainer.addEventListener('mouseenter', () => {
                        if (infoWindowTimer) clearTimeout(infoWindowTimer);
                    });
                    iwContainer.addEventListener('mouseleave', () => {
                        startInfoWindowTimer();
                    });
                }
            });

            const mapStyle = [
                { featureType: "poi", stylers: [{ visibility: "off" }] },
                { featureType: "transit", stylers: [{ visibility: "off" }] },
                { elementType: "geometry", stylers: [{ color: "#f5f5f5" }] },
                { elementType: "labels.icon", stylers: [{ visibility: "off" }] },
                { elementType: "labels.text.fill", stylers: [{ color: "#616161" }] },
                { elementType: "labels.text.stroke", stylers: [{ color: "#f5f5f5" }] },
                { featureType: "water", elementType: "geometry", stylers: [{ color: "#c9e8f5" }] },
                { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#9e9e9e" }] }
            ];

            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: -34.7573, lng: -58.4035 },
                zoom: 13,
                styles: mapStyle,
                mapTypeControl: false,
                streetViewControl: false
            });

            const noCache = '?v=' + new Date().getTime();

            // 1. Límite Lomas (Línea Punteada)
            fetch('./municipios_Lomas de Zamora.geojson' + noCache).then(r => r.json()).then(geoJson => {
                geoJson.features.forEach(feature => {
                    if (feature.geometry.type === 'MultiPolygon' || feature.geometry.type === 'Polygon') {
                        const polys = feature.geometry.type === 'Polygon' ? [feature.geometry.coordinates] : feature.geometry.coordinates;
                        polys.forEach(poly => {
                            poly.forEach(ring => {
                                const path = ring.map(coord => ({ lat: coord[1], lng: coord[0] }));
                                const p = new google.maps.Polygon({ paths: path, strokeOpacity: 0, fillColor: '#2A7E43', fillOpacity: 0.03, map: map, zIndex: 2 });
                                const lineSymbol = { path: 'M 0,-1 0,1', strokeOpacity: 1, scale: 3 };
                                const l = new google.maps.Polyline({ path: path, strokeOpacity: 0, icons: [{ icon: lineSymbol, offset: '0', repeat: '15px' }], strokeColor: '#2A7E43', strokeWeight: 3, map: map, zIndex: 3 });
                                limiteElements.push(p, l);
                            });
                        });
                    }
                });
            }).catch(e => console.log('Error cargando límite:', e));

            // 2. Cargar CGM GeoJSON
            cgmLayer = new google.maps.Data();
            fetch('./CGM.geojson' + noCache).then(r => {
                if(!r.ok) throw new Error("Fallo la carga de CGM.geojson");
                return r.json();
            }).then(geoJson => {
                cgmLayer.addGeoJson(geoJson);
                
                geoJson.features.forEach(f => {
                    if (f.properties && f.properties.CGM) {
                        cgmSet.add(f.properties.CGM.trim());
                    }
                });
                updateCgmDropdown();
                updateStyles(); 
            }).catch(e => console.log('Aviso: CGM.geojson no cargado. Se utilizarán únicamente los CGMs mapeados en cortedepasto.geojson'));

            cgmLayer.setMap(map);

            // 3. Cargar Cortes de Pasto GeoJSON (Líneas, Polígonos y Puntos juntos)
            cortesLayer = new google.maps.Data();
            
            const procesarCortes = (geoJson) => {
                cortesLayer.addGeoJson(geoJson);
                const fechasSet = new Set();
                
                geoJson.features.forEach(f => {
                    if (f.properties && f.properties.Fecha_str) {
                        fechasSet.add(formatDateToShow(f.properties.Fecha_str));
                    }
                    if (f.properties && f.properties.CGM) {
                        cgmSet.add(f.properties.CGM.trim());
                    }
                });
                
                // Actualizar los desplegables de CGMs recolectados
                updateCgmDropdown();

                const selectFecha = document.getElementById('filtro-fecha');
                const sortedFechas = Array.from(fechasSet).sort((a, b) => {
                    const d1 = parseDateCustom(a);
                    const d2 = parseDateCustom(b);
                    if (isNaN(d1.getTime())) return 1;
                    if (isNaN(d2.getTime())) return -1;
                    return d1 - d2;
                });

                sortedFechas.forEach(fecha => {
                    if(fecha !== '-') {
                        const opt = document.createElement('option');
                        opt.value = fecha; 
                        opt.textContent = fecha;
                        selectFecha.appendChild(opt);
                    }
                });
                
                selectFecha.addEventListener('change', () => {
                    updateCortesStyles();
                });

                const selectGlobalCgm = document.getElementById('filtro-global-cgm');
                selectGlobalCgm.addEventListener('change', () => {
                    updateStyles();
                    updateCortesStyles();
                });

                updateCortesStyles(); 
            };

            // Intentar cargar exclusivamente del archivo cortedepasto.geojson
            fetch('./cortedepasto.geojson' + noCache)
                .then(r => {
                    if (!r.ok) throw new Error("Fallo el fetch remoto");
                    return r.json();
                })
                .then(procesarCortes)
                .catch(e => {
                    console.error('Error al intentar obtener cortedepasto.geojson. Asegúrate de tener el archivo alojado en el mismo directorio.', e);
                });

            cortesLayer.setMap(map);

            // --- FUNCIONES DE ESTILOS Y FILTROS ---
            function updateStyles() {
                const globalCgmSelect = document.getElementById('filtro-global-cgm');
                const globalCgm = globalCgmSelect ? globalCgmSelect.value : "TODOS";

                cgmLayer.setStyle((feature) => {
                    const featCgm = feature.getProperty('CGM');
                    const cleanFeatCgm = normalizeCgmName(featCgm);
                    let isVisible = true;
                    let opacidad = 0.25;
                    let grosor = 3;

                    if (globalCgm !== "TODOS") {
                        if (cleanFeatCgm !== globalCgm) {
                            isVisible = false; 
                        } else {
                            opacidad = 0.4; 
                            grosor = 4;
                        }
                    }

                    return {
                        fillColor: '#7ED957', 
                        fillOpacity: opacidad, 
                        strokeColor: '#2A7E43', 
                        strokeWeight: grosor,        
                        strokeOpacity: 0.9, 
                        zIndex: 1,
                        visible: isVisible
                    };
                });
            }

            function updateCortesStyles() {
                const globalCgmSelect = document.getElementById('filtro-global-cgm');
                const globalCgm = globalCgmSelect ? globalCgmSelect.value : "TODOS";
                
                const fechaSelect = document.getElementById('filtro-fecha');
                const fechaFiltro = fechaSelect ? fechaSelect.value : "TODAS";

                cortesLayer.setStyle((feature) => {
                    const featCgm = feature.getProperty('CGM');
                    const cleanFeatCgm = normalizeCgmName(featCgm);
                    const featFechaOriginal = feature.getProperty('Fecha_str'); 
                    const featFechaClean = formatDateToShow(featFechaOriginal);
                    const dynamicDayColor = getColorPorDiaSemana(featFechaOriginal); 
                    let isVisible = true;

                    // Filtro Global CGM
                    if (globalCgm !== "TODOS") {
                        if (cleanFeatCgm !== globalCgm) {
                            isVisible = false;
                        }
                    }

                    // Filtro de Fecha
                    if (fechaFiltro !== "TODAS") {
                        if (featFechaClean !== fechaFiltro) {
                            isVisible = false;
                        }
                    }

                    const geomType = feature.getGeometry() ? feature.getGeometry().getType() : '';

                    // Si es un punto (Plaza/Escuela/Predio), aplicamos ícono inteligente con color dinámico
                    if (geomType === 'Point') {
                        const nombreRaw = feature.getProperty('Inicio Recorrido') || feature.getProperty('PLAZA') || feature.getProperty('NOMBRE') || '';
                        const nombreUpper = nombreRaw.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
                        
                        let type = 'PLAZA';
                        if (nombreUpper.includes('ESCUELA') || nombreUpper.includes('COLEGIO') || nombreUpper.includes('JARDIN') || nombreUpper.includes('FORMACION') || nombreUpper.includes('TECNICA') || nombreUpper.includes('PRIMARIA') || nombreUpper.includes('SECUNDARIA')) {
                            type = 'ESCUELA';
                        } else if (nombreUpper.includes('POLIDEPORTIVO') || nombreUpper.includes('CLUB') || nombreUpper.includes('PREDIO') || nombreUpper.includes('DOTA')) {
                            type = 'POLIDEPORTIVO';
                        }

                        return {
                            icon: getCustomIcon(type, dynamicDayColor),
                            zIndex: 6,
                            visible: isVisible
                        };
                    } else {
                        // Si es línea o polígono (recorridos o áreas de corte)
                        return {
                            fillColor: dynamicDayColor,
                            fillOpacity: 0.6,
                            strokeColor: dynamicDayColor,
                            strokeWeight: 4, 
                            zIndex: 5,
                            visible: isVisible
                        };
                    }
                });
            }

            // Ventanas Emergentes base para CGM y Cortes
            function bindPopup(layer, colorTitle, layerType = 'cgm') {
                layer.addListener('click', function(event) {
                    let content = `<div style="font-family: 'Montserrat', sans-serif; min-width: 200px; position: relative;">`;
                    content += `<button onclick="window.closeInfoWindow()" class="custom-close-btn">&times;</button>`;
                    
                    if (layerType === 'corte') {
                        const geomType = event.feature.getGeometry() ? event.feature.getGeometry().getType() : '';
                        const fechaCorteOriginal = event.feature.getProperty('Fecha_str');
                        const fechaCorteClean = formatDateToShow(fechaCorteOriginal);
                        const dynamicDayColor = getColorPorDiaSemana(fechaCorteOriginal);
                        
                        if (geomType === 'Point') {
                            // Información de Puntos
                            const nombreRaw = event.feature.getProperty('Inicio Recorrido') || event.feature.getProperty('PLAZA') || event.feature.getProperty('NOMBRE') || 'Lugar de Interés';
                            const nombreUpper = nombreRaw.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
                            
                            let colorDin = '#84CC16';
                            let tipoLabel = 'Corte en Plaza / Parque';
                            
                            if (nombreUpper.includes('ESCUELA') || nombreUpper.includes('COLEGIO') || nombreUpper.includes('JARDIN') || nombreUpper.includes('FORMACION') || nombreUpper.includes('TECNICA') || nombreUpper.includes('PRIMARIA') || nombreUpper.includes('SECUNDARIA')) { 
                                colorDin = '#F59E0B'; 
                                tipoLabel = 'Corte en Institución Educativa'; 
                            }
                            else if (nombreUpper.includes('POLIDEPORTIVO') || nombreUpper.includes('CLUB') || nombreUpper.includes('PREDIO') || nombreUpper.includes('DOTA')) { 
                                colorDin = '#0EA5E9'; 
                                tipoLabel = 'Corte en Deporte / Predio / Polideportivo'; 
                            }

                            content += `<h3 style="font-weight: 800; font-size: 14px; color: ${colorDin}; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">${tipoLabel}</h3>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Nombre:</b> ${nombreRaw}</p>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Fecha:</b> ${fechaCorteClean}</p>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${event.feature.getProperty('CGM') || '-'}</p>`;
                            
                            const localidad = event.feature.getProperty('Localidad');
                            if (localidad) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Localidad:</b> ${localidad}</p>`;
                            }
                            const ubicacion = event.feature.getProperty('UBICACION') || event.feature.getProperty('DIRECCION');
                            if (ubicacion) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Ubicación:</b> ${ubicacion}</p>`;
                            }
                        } else {
                            // Información de Líneas o Polígonos
                            content += `<h3 style="font-weight: 800; font-size: 14px; color: ${dynamicDayColor}; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">Recorrido de Corte</h3>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Fecha:</b> ${fechaCorteClean}</p>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${event.feature.getProperty('CGM') || '-'}</p>`;
                            
                            const localidad = event.feature.getProperty('Localidad');
                            if (localidad) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Localidad:</b> ${localidad}</p>`;
                            }
                            if(event.feature.getProperty('Inicio Recorrido')) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Inicio:</b> ${event.feature.getProperty('Inicio Recorrido')}</p>`;
                            }
                            if(event.feature.getProperty('Fin del Recorrido')) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Fin:</b> ${event.feature.getProperty('Fin del Recorrido')}</p>`;
                            }
                            
                            const distancia = event.feature.getProperty('Distancia');
                            if(distancia && distancia > 0) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Distancia:</b> ${distancia} m</p>`;
                            }
                            const area = event.feature.getProperty('Area');
                            if(area && area > 0) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Área:</b> ${area} m²</p>`;
                            }
                        }
                    } else { // CGM
                        content += `<h3 style="font-weight: 800; font-size: 14px; color: ${colorTitle}; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">CGM: ${event.feature.getProperty('CGM')}</h3>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Manzanas:</b> ${event.feature.getProperty('Manzanas') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Cuadras:</b> ${event.feature.getProperty('Cuadras') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Viviendas:</b> ${event.feature.getProperty('Viviendas') || '-'}</p>`;
                    }
                    
                    content += `</div>`;
                    
                    infoWindow.setContent(content);
                    
                    if (event.feature.getGeometry().getType() === 'Point') {
                        infoWindow.setPosition(event.feature.getGeometry().get());
                    } else {
                        infoWindow.setPosition(event.latLng);
                    }
                    infoWindow.open(map);
                    startInfoWindowTimer(); 
                });
            }

            bindPopup(cgmLayer, '#2A7E43', 'cgm');
            bindPopup(cortesLayer, '#19567C', 'corte');

            // Toggles de Capas
            document.getElementById('cb-limite').addEventListener('change', (e) => {
                const m = e.target.checked ? map : null;
                limiteElements.forEach(el => el.setMap(m));
            });

            document.getElementById('cb-cgm').addEventListener('change', (e) => {
                e.target.checked ? cgmLayer.setMap(map) : cgmLayer.setMap(null);
            });

            document.getElementById('cb-cortes').addEventListener('change', (e) => {
                e.target.checked ? cortesLayer.setMap(map) : cortesLayer.setMap(null);
            });
        }
    </script>
</body>
</html>
