<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Ambiente Lomas - Lomas de Zamora</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fuentes e Íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-main: #1E5E3A; /* Tono verde bosque corporativo para Ambiente */
            --blanco: #FFFFFF;
            --acento: #86EFAC;  /* Verde claro de acento */
            --azul-inst: #19567C;
            --color-barrido: #1E5E3A; /* Color verde institucional para Barrido */
            --color-covelia: #10B981; /* Color verde esmeralda brillante para Covelia Barrido */
            --color-recoleccion: #15803D; /* Color verde esmeralda profundo para Covelia Recolección */
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-main); color: var(--blanco); margin: 0; min-height: 100vh; }
        
        #map { height: 100%; width: 100%; border-radius: 8px; background-color: #f8fafc; z-index: 10; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #F3F6F9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E6EDF3; border-radius: 4px; }

        /* Ajustes para la ventana de Info de Google Maps */
        .gm-style-iw.gm-style-iw-c {
            border-radius: 8px !important;
            padding: 12px !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06) !important;
        }
        .gm-style-iw-d { overflow: hidden !important; }
        button.gm-ui-hover-effect { display: none !important; }

        /* Estilos del Botón de Cierre Personalizado */
        .custom-close-btn {
            position: absolute;
            right: -4px;
            top: -6px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #94A3B8;
            font-size: 22px;
            font-weight: bold;
            line-height: 1;
            padding: 2px 6px;
            border-radius: 6px;
            transition: all 0.2s ease;
            z-index: 50;
        }
        .custom-close-btn:hover {
            background-color: #F1F5F9;
            color: var(--bg-main);
        }
    </style>
</head>
<body class="flex flex-col">

    <header class="bg-[var(--bg-main)] shadow-lg border-b-4 border-[var(--acento)] z-20 py-6 px-4 shrink-0">
        <div class="max-w-[1600px] mx-auto flex items-center justify-center gap-4">
            <div class="bg-white text-[var(--bg-main)] rounded-full h-14 w-14 flex items-center justify-center shadow-md">
                <i class="fa-solid fa-seedling text-2xl"></i>
            </div>
            <div class="flex flex-col">
                <h1 class="text-3xl font-extrabold tracking-tight uppercase leading-none">Mapa Ambiente Lomas</h1>
            </div>
        </div>
    </header>

    <main class="w-full max-w-[1600px] mx-auto py-8 px-4 flex-1 flex flex-col lg:flex-row gap-6">
        
        <aside class="w-full lg:w-80 bg-white rounded-xl shadow-md border border-[#E6EDF3] flex flex-col max-h-[calc(100vh-200px)] overflow-hidden shrink-0 z-20">
            <div class="p-4 border-b bg-[#F3F6F9] flex items-center gap-2">
                <i data-lucide="filter" class="text-[var(--bg-main)] h-5 w-5"></i>
                <h3 class="font-bold text-[#0F172A] uppercase text-sm">Capas de Información</h3>
            </div>
            
            <div class="p-5 overflow-y-auto custom-scrollbar flex-1 space-y-6">
                
                <!-- SECCIÓN: FILTRO GLOBAL -->
                <div class="bg-[var(--bg-main)]/10 p-3 rounded-lg border border-[var(--bg-main)]/30 shadow-sm">
                    <h4 class="text-xs font-extrabold text-[var(--bg-main)] uppercase mb-2 flex items-center gap-2">
                        <i data-lucide="crosshair" class="h-4 w-4"></i> Filtro Global de Zona
                    </h4>
                    <select id="filtro-global-cgm" class="w-full text-xs p-2 border border-[var(--bg-main)]/30 rounded focus:outline-none focus:border-[var(--bg-main)] font-semibold text-[#0F172A] cursor-pointer">
                        <option value="TODOS">TODOS LOS CGM</option>
                        <!-- Se llena dinámicamente -->
                    </select>
                </div>

                <!-- SECCIÓN: DIVISIÓN TERRITORIAL -->
                <div class="bg-[var(--bg-main)]/10 p-3 rounded-lg border border-[var(--bg-main)]/30">
                    <h4 class="text-xs font-extrabold text-[var(--bg-main)] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="map" class="h-4 w-4"></i> División Territorial
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-limite" checked class="w-4 h-4 accent-[var(--bg-main)]">
                            <span class="text-sm text-[#0F172A] font-bold">Límite Lomas de Zamora</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-cgm" checked class="w-4 h-4 accent-[var(--bg-main)]">
                            <span class="text-sm text-[#0F172A] font-bold">División por CGM</span>
                        </label>
                    </div>
                </div>

                <!-- SECCIÓN: BARRIDO -->
                <div class="bg-[var(--color-barrido)]/10 p-3 rounded-lg border border-[var(--color-barrido)]/30">
                    <h4 class="text-xs font-extrabold text-[var(--color-barrido)] uppercase mb-3 flex items-center gap-2">
                        <i class="fa-solid fa-broom text-sm"></i> Barrido
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-barrido" checked class="w-4 h-4 accent-[var(--color-barrido)]">
                            <span class="text-sm text-[#0F172A] font-bold">Ver Barrido</span>
                        </label>
                        <div class="flex flex-col gap-1 mt-2 pl-7 mb-3">
                            <label class="text-xs font-semibold text-gray-600">Filtrar por Barrendero:</label>
                            <select id="filtro-barrendero" class="w-full text-xs p-1.5 border border-gray-300 rounded focus:outline-none focus:border-[var(--color-barrido)] font-semibold text-[#0F172A] cursor-pointer">
                                <option value="TODOS">TODOS LOS BARRENDEROS</option>
                                <!-- Se llena dinámicamente -->
                            </select>
                        </div>
                        
                        <!-- CAPA: ZONAS BARRIDO COVELIA -->
                        <label class="flex items-center gap-3 cursor-pointer pt-3 border-t border-[var(--color-barrido)]/20">
                            <input type="checkbox" id="cb-covelia" checked class="w-4 h-4 accent-[var(--color-barrido)]">
                            <span class="text-sm text-[#0F172A] font-bold">Zonas Barrido Covelia</span>
                        </label>
                    </div>
                </div>

                <!-- SECCIÓN: COVELIA RECOLECCIÓN -->
                <div class="bg-[var(--color-recoleccion)]/10 p-3 rounded-lg border border-[var(--color-recoleccion)]/30">
                    <h4 class="text-xs font-extrabold text-[var(--color-recoleccion)] uppercase mb-3 flex items-center gap-2">
                        <i class="fa-solid fa-truck text-sm"></i> Covelia Recolección
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-recoleccion" checked class="w-4 h-4 accent-[var(--color-recoleccion)]">
                            <span class="text-sm text-[#0F172A] font-bold">Rutas Recoleccion Covelia</span>
                        </label>
                        <div class="flex flex-col gap-1 mt-2 pl-7">
                            <label class="text-xs font-semibold text-gray-600">Filtrar por Turno:</label>
                            <select id="filtro-recoleccion-turno" class="w-full text-xs p-1.5 border border-gray-300 rounded focus:outline-none focus:border-[var(--color-recoleccion)] font-semibold text-[#0F172A] cursor-pointer">
                                <option value="TODOS">TODOS LOS TURNOS</option>
                                <!-- Se llena dinámicamente -->
                            </select>
                        </div>
                    </div>
                </div>

                <!-- SECCIÓN: CORTES DE PASTO -->
                <div class="bg-[var(--bg-main)]/10 p-3 rounded-lg border border-[var(--bg-main)]/30">
                    <h4 class="text-xs font-extrabold text-[var(--bg-main)] uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="scissors" class="h-4 w-4"></i> Corte de Pasto
                    </h4>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="cb-cortes" checked class="w-4 h-4 accent-[var(--bg-main)]">
                            <span class="text-sm text-[#0F172A] font-bold">Ver Cortes de Pasto</span>
                        </label>
                        <div class="flex flex-col gap-1 mt-2 pl-7">
                            <label class="text-xs font-semibold text-gray-600">Filtrar por Fecha:</label>
                            <select id="filtro-fecha" class="w-full text-xs p-1.5 border border-gray-300 rounded focus:outline-none focus:border-[var(--bg-main)] font-semibold text-[#0F172A] cursor-pointer">
                                <option value="TODAS">TODAS LAS FECHAS</option>
                                <!-- Se llena dinámicamente -->
                            </select>
                        </div>
                    </div>
                </div>

                <!-- SECCIÓN RESPALDO: CARGADOR MANUAL LOCAL (Se activa si el CORS bloquea la carga local) -->
                <div id="seccion-local-uploader" class="bg-amber-500/10 p-3 rounded-lg border border-amber-500/30 hidden">
                    <h4 class="text-xs font-extrabold text-amber-700 uppercase mb-2 flex items-center gap-2">
                        <i data-lucide="upload-cloud" class="h-4 w-4"></i> Cargar GeoJSON Local
                    </h4>
                    <p class="text-[10px] text-gray-600 mb-2">Para ver el mapa offline o local sin servidor CORS, selecciona tus archivos manualmente:</p>
                    <input type="file" id="input-geojson-local" accept=".geojson, .json" class="w-full text-xs text-[#0F172A] file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-amber-600 file:text-white hover:file:bg-amber-700 cursor-pointer" multiple>
                </div>

            </div>
        </aside>

        <div class="flex-1 bg-white p-2 rounded-xl shadow-lg border border-[#E6EDF3] flex flex-col min-h-[500px] relative z-10">
            <div id="map"></div>
        </div>

    </main>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB2MHti5Cy4IDKPc3Iu0ypNQg_BgsjcMoQ&callback=initMap" defer></script>

    <script>
        let map, infoWindow;
        let infoWindowTimer;
        let cgmLayer;
        let cortesLayer;
        let barridoLayer;
        let coveliaLayer;
        let recoleccionLayer;
        let limiteElements = []; 
        const cgmMap = new Map(); // Mapa de CGM normalizado -> Nombre original para evitar duplicados en el select
        let barridoGeoJsonData = null; // Almacenamiento global para los datos de barrido y filtrado dinámico
        let recoleccionGeoJsonData = null; // Almacenamiento global para recolección

        // --- FUNCIÓN DE NORMALIZACIÓN DE CGMs (Evita fallos por espacios o acentos en el JSON) ---
        function normalizeCgmName(cgmName) {
            if (!cgmName) return "";
            return cgmName
                .trim()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "") 
                .toUpperCase();
        }

        // --- FUNCIÓN DE BÚSQUEDA DE PROPIEDAD CGM INSENSIBLE A MAYÚSCULAS/MINÚSCULAS ---
        function getFeatureCgmProperty(feature) {
            if (!feature) return "";
            let cgm = feature.getProperty('CGM');
            if (cgm !== undefined && cgm !== null) return String(cgm);
            cgm = feature.getProperty('cgm');
            if (cgm !== undefined && cgm !== null) return String(cgm);
            cgm = feature.getProperty('Cgm');
            if (cgm !== undefined && cgm !== null) return String(cgm);
            
            let found = "";
            if (typeof feature.forEachProperty === 'function') {
                feature.forEachProperty((val, key) => {
                    if (key.toLowerCase() === 'cgm') {
                        found = String(val);
                    }
                });
            }
            return found;
        }

        function getGeoJsonFeatureCgm(f) {
            if (!f || !f.properties) return "";
            if (f.properties.CGM) return f.properties.CGM;
            if (f.properties.cgm) return f.properties.cgm;
            if (f.properties.Cgm) return f.properties.Cgm;
            
            for (let key in f.properties) {
                if (key.toLowerCase() === 'cgm') {
                    return f.properties[key];
                }
            }
            return "";
        }

        // --- REGISTRAR CGM DE FORMA ÚNICA ---
        function registerCgm(cgmName) {
            if (!cgmName) return;
            const trimmed = cgmName.trim();
            if (!trimmed) return;
            const normalized = normalizeCgmName(trimmed);
            
            if (!cgmMap.has(normalized)) {
                cgmMap.set(normalized, trimmed);
            } else {
                const existing = cgmMap.get(normalized);
                // Preferir formato tipo oración (capitalizado) sobre todo mayúsculas
                if (existing === existing.toUpperCase() && trimmed !== trimmed.toUpperCase()) {
                    cgmMap.set(normalized, trimmed);
                }
            }
        }

        // --- PARSEO LITERAL DE FECHAS SEGURO ---
        function parseDateCustom(dateStr) {
            if (!dateStr) return null;
            dateStr = dateStr.trim();
            
            // Caso 1: Formato DD/MM/YYYY o D/M/YYYY
            if (dateStr.includes('/')) {
                const parts = dateStr.split('/');
                if (parts.length === 3) {
                    const day = parseInt(parts[0], 10);
                    const month = parseInt(parts[1], 10) - 1; 
                    const year = parseInt(parts[2], 10);
                    if (!isNaN(day) && !isNaN(month) && !isNaN(year)) {
                        return new Date(year, month, day);
                    }
                }
            }
            
            // Caso 2: Formato extendido de zona horaria (ej: "Sat Feb 21 2026...")
            const parts = dateStr.split(/\s+/);
            if (parts.length >= 4) {
                const yearIndex = parts.findIndex(p => /^\d{4}$/.test(p));
                if (yearIndex !== -1) {
                    const year = parseInt(parts[yearIndex], 10);
                    const dayIndex = parts.findIndex((p, idx) => /^\d{1,2}$/.test(p) && idx !== yearIndex);
                    if (dayIndex !== -1) {
                        const day = parseInt(parts[dayIndex], 10);
                        const monthsMap = {
                            jan: 0, feb: 1, mar: 2, apr: 3, may: 4, jun: 5, jul: 6, aug: 7, sep: 8, oct: 9, nov: 10, dec: 11,
                            ene: 0, abr: 3, ago: 7, dic: 11
                        };
                        let month = -1;
                        for (let p of parts) {
                            const cleanP = p.toLowerCase().substring(0, 3);
                            if (monthsMap[cleanP] !== undefined) {
                                month = monthsMap[cleanP];
                                break;
                            }
                        }
                        if (month !== -1 && !isNaN(day) && !isNaN(year)) {
                            return new Date(year, month, day);
                        }
                    }
                }
            }
            
            // Fallback
            const cleanStr = dateStr.replace(/\s*\(.*\)\s*/, '').trim();
            const d = new Date(cleanStr);
            if (!isNaN(d.getTime())) {
                return new Date(d.getFullYear(), d.getMonth(), d.getDate());
            }
            return null;
        }

        function formatDateToShow(dateStr) {
            if (!dateStr) return '-';
            const parsed = parseDateCustom(dateStr);
            if (!parsed) return dateStr;
            const day = String(parsed.getDate()).padStart(2, '0');
            const month = String(parsed.getMonth() + 1).padStart(2, '0');
            const year = parsed.getFullYear();
            return `${day}/${month}/${year}`;
        }
        
        // --- FUNCIÓN DE COLORES POR DÍA (GAMA AZULES CORPORATIVOS) ---
        function getColorPorDiaSemana(fechaStr) {
            const parsed = parseDateCustom(fechaStr);
            if (!parsed) return '#19567C'; 
            
            const diaSemana = parsed.getDay(); // 0 = Domingo, 1 = Lunes, etc.
            
            const coloresAzul = {
                1: '#03045E', // Lunes - Azul Marino Oscuro
                2: '#023E8A', // Martes - Azul Fuerte
                3: '#0077B6', // Miércoles - Azul Medio
                4: '#0096C7', // Jueves - Azul Celeste Oscuro
                5: '#00B4D8', // Viernes - Celeste
                6: '#48CAE4', // Sábado - Celeste Claro
                0: '#90E0EF'  // Domingo - Cyan Muy Claro
            };
            
            return coloresAzul[diaSemana] || '#19567C';
        }

        // --- GENERADOR DE ICONOS INTELIGENTE (PLAZAS/ESCUELAS/PREDIOS) ---
        function getCustomIcon(type, strokeColor = '#FFFFFF') {
            let bgColor, letter;
            if (type === 'ESCUELA') {
                bgColor = '#F59E0B'; // Naranja
                letter = 'E';
            } else if (type === 'POLIDEPORTIVO') {
                bgColor = '#0EA5E9'; // Celeste
                letter = 'D'; // Deportes / Predios / DOTA
            } else {
                bgColor = '#84CC16'; // Verde Lima
                letter = 'P'; // Plaza/Parque
            }
            
            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
                    <circle cx="12" cy="12" r="10" fill="${bgColor}" stroke="${strokeColor}" stroke-width="3"/>
                    <text x="12" y="16" font-family="Montserrat, sans-serif" font-weight="bold" font-size="11" fill="#FFFFFF" text-anchor="middle">${letter}</text>
                </svg>
            `;
            return {
                url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
                scaledSize: new google.maps.Size(24, 24),
                anchor: new google.maps.Point(12, 12)
            };
        }

        // --- ACTUALIZACIÓN DINÁMICA DEL SELECTOR DE CGMs ---
        function updateCgmDropdown() {
            const selectGlobalCgm = document.getElementById('filtro-global-cgm');
            const selectedVal = selectGlobalCgm.value;
            
            selectGlobalCgm.innerHTML = '<option value="TODOS">TODOS LOS CGM</option>';
            
            const sortedNormalized = Array.from(cgmMap.keys()).sort((a, b) => {
                return cgmMap.get(a).localeCompare(cgmMap.get(b));
            });

            sortedNormalized.forEach(normalized => {
                const properName = cgmMap.get(normalized);
                const opt = document.createElement('option');
                opt.value = normalized;
                const formattedName = properName.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
                opt.textContent = formattedName;
                selectGlobalCgm.appendChild(opt);
            });
            
            selectGlobalCgm.value = selectedVal;
        }

        // --- ACTUALIZACIÓN DINÁMICA DEL SELECTOR DE BARRENDEROS BASADO EN EL CGM SELECCIONADO ---
        function updateBarrenderoDropdown() {
            if (!barridoGeoJsonData) return;

            const globalCgmSelect = document.getElementById('filtro-global-cgm');
            const globalCgm = globalCgmSelect ? globalCgmSelect.value : "TODOS";

            const selectBarrendero = document.getElementById('filtro-barrendero');
            const selectedVal = selectBarrendero ? selectBarrendero.value : "TODOS";

            const barrenderosSet = new Set();
            barridoGeoJsonData.features.forEach(f => {
                if (f.properties && f.properties.BARRENDERO) {
                    const featCgm = getGeoJsonFeatureCgm(f);
                    const cleanFeatCgm = normalizeCgmName(featCgm);

                    // Si el CGM global es "TODOS" o el CGM de la feature coincide con el filtrado global
                    if (globalCgm === "TODOS" || cleanFeatCgm === globalCgm) {
                        barrenderosSet.add(f.properties.BARRENDERO.trim());
                    }
                }
            });

            if (selectBarrendero) {
                selectBarrendero.innerHTML = '<option value="TODOS">TODOS LOS BARRENDEROS</option>';
                const sortedBarrenderos = Array.from(barrenderosSet).sort();
                sortedBarrenderos.forEach(barrendero => {
                    const opt = document.createElement('option');
                    opt.value = barrendero;
                    opt.textContent = barrendero;
                    selectBarrendero.appendChild(opt);
                });

                // Conservar selección si el barrendero sigue disponible en la lista filtrada, sino volver a TODOS
                if (barrenderosSet.has(selectedVal)) {
                    selectBarrendero.value = selectedVal;
                } else {
                    selectBarrendero.value = "TODOS";
                }
            }
        }

        // --- LIMPIEZA DE GEOJSON DAÑADO Y RECONSTRUCCIÓN DEFENSIVA ---
        function sanitizeGeoJson(geoJson) {
            if (!geoJson || !geoJson.features) return geoJson;
            
            const sanitizedFeatures = geoJson.features.map(feature => {
                if (!feature.geometry || !feature.geometry.coordinates) return feature;
                
                const type = feature.geometry.type;
                const coords = feature.geometry.coordinates;
                
                try {
                    if (type === 'Point') {
                        if (!Array.isArray(coords) || coords.length < 2 || coords[0] === null || coords[1] === null || isNaN(coords[0]) || isNaN(coords[1])) {
                            feature.geometry = null;
                        }
                    } else if (type === 'LineString' || type === 'MultiPoint') {
                        if (Array.isArray(coords)) {
                            const clean = coords.filter(c => Array.isArray(c) && c.length >= 2 && c[0] !== null && c[1] !== null && !isNaN(c[0]) && !isNaN(c[1]));
                            if (clean.length >= 2) {
                                feature.geometry.coordinates = clean;
                            } else if (clean.length === 1) {
                                feature.geometry.type = 'Point';
                                feature.geometry.coordinates = clean[0];
                            } else {
                                feature.geometry = null;
                            }
                        } else {
                            feature.geometry = null;
                        }
                    } else if (type === 'Polygon' || type === 'MultiLineString') {
                        if (Array.isArray(coords)) {
                            const cleanRings = coords.map(ring => {
                                if (!Array.isArray(ring)) return [];
                                return ring.filter(c => Array.isArray(c) && c.length >= 2 && c[0] !== null && c[1] !== null && !isNaN(c[0]) && !isNaN(c[1]));
                            }).filter(ring => ring.length > 0);
                            
                            if (cleanRings.length > 0) {
                                const mainRing = cleanRings[0];
                                if (mainRing.length >= 3 && type === 'Polygon') {
                                    feature.geometry.coordinates = cleanRings;
                                } else if (mainRing.length >= 2) {
                                    feature.geometry.type = 'LineString';
                                    feature.geometry.coordinates = mainRing;
                                } else if (mainRing.length === 1) {
                                    feature.geometry.type = 'Point';
                                    feature.geometry.coordinates = mainRing[0];
                                } else {
                                    feature.geometry = null;
                                }
                            } else {
                                feature.geometry = null;
                            }
                        } else {
                            feature.geometry = null;
                        }
                    } else if (type === 'MultiPolygon') {
                        if (Array.isArray(coords)) {
                            const cleanPolys = coords.map(poly => {
                                if (!Array.isArray(poly)) return [];
                                return poly.map(ring => {
                                    if (!Array.isArray(ring)) return [];
                                    return ring.filter(c => Array.isArray(c) && c.length >= 2 && c[0] !== null && c[1] !== null && !isNaN(c[0]) && !isNaN(c[1]));
                                }).filter(ring => ring.length > 0);
                            }).filter(poly => poly.length > 0);
                            
                            if (cleanPolys.length > 0) {
                                feature.geometry.coordinates = cleanPolys;
                            } else {
                                feature.geometry = null;
                            }
                        } else {
                            feature.geometry = null;
                        }
                    }
                } catch (err) {
                    console.error("Error sanitizando geometría:", err);
                    feature.geometry = null;
                }
                return feature;
            }).filter(f => f.geometry !== null && f.geometry !== undefined);

            return {
                ...geoJson,
                features: sanitizedFeatures
            };
        }

        function startInfoWindowTimer() {
            if (infoWindowTimer) clearTimeout(infoWindowTimer);
            infoWindowTimer = setTimeout(() => {
                if (infoWindow) infoWindow.close();
            }, 10000); 
        }

        window.closeInfoWindow = function() {
            if (infoWindow) {
                infoWindow.close();
            }
            if (infoWindowTimer) {
                clearTimeout(infoWindowTimer);
            }
        };

        function initMap() {
            lucide.createIcons();
            infoWindow = new google.maps.InfoWindow();
            
            google.maps.event.addListener(infoWindow, 'domready', () => {
                const iwContainer = document.querySelector('.gm-style-iw-c');
                if (iwContainer) {
                    iwContainer.addEventListener('mouseenter', () => {
                        if (infoWindowTimer) clearTimeout(infoWindowTimer);
                    });
                    iwContainer.addEventListener('mouseleave', () => {
                        startInfoWindowTimer();
                    });
                }
            });

            const mapStyle = [
                { featureType: "poi", stylers: [{ visibility: "off" }] },
                { featureType: "transit", stylers: [{ visibility: "off" }] },
                { elementType: "geometry", stylers: [{ color: "#f5f5f5" }] },
                { elementType: "labels.icon", stylers: [{ visibility: "off" }] },
                { elementType: "labels.text.fill", stylers: [{ color: "#616161" }] },
                { elementType: "labels.text.stroke", stylers: [{ color: "#f5f5f5" }] },
                { featureType: "water", elementType: "geometry", stylers: [{ color: "#c9e8f5" }] },
                { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#9e9e9e" }] }
            ];

            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: -34.7573, lng: -58.4035 },
                zoom: 13,
                styles: mapStyle,
                mapTypeControl: false,
                streetViewControl: false
            });

            // --- REGISTRAR LOS LISTENERS DE CAMBIOS GLOBALES DE FORMA SEGURA Y ÚNICA ---
            const selectGlobalCgm = document.getElementById('filtro-global-cgm');
            selectGlobalCgm.addEventListener('change', () => {
                updateStyles();
                updateCortesStyles();
                updateBarrenderoDropdown(); // Se recalculan dinámicamente los barrenderos según la zona CGM elegida
                updateBarridoStyles();
                updateCoveliaStyles();
                updateRecoleccionStyles();
            });

            const selectFecha = document.getElementById('filtro-fecha');
            selectFecha.addEventListener('change', () => {
                updateCortesStyles();
            });

            const selectBarrendero = document.getElementById('filtro-barrendero');
            selectBarrendero.addEventListener('change', () => {
                updateBarridoStyles();
            });

            const noCache = '?v=' + new Date().getTime();

            // 1. Límite Lomas (Línea Punteada)
            fetch('./municipios_Lomas de Zamora.geojson' + noCache).then(r => r.json()).then(geoJson => {
                geoJson.features.forEach(feature => {
                    if (feature.geometry.type === 'MultiPolygon' || feature.geometry.type === 'Polygon') {
                        const polys = feature.geometry.type === 'Polygon' ? [feature.geometry.coordinates] : feature.geometry.coordinates;
                        polys.forEach(poly => {
                            poly.forEach(ring => {
                                const path = ring.map(coord => ({ lat: coord[1], lng: coord[0] }));
                                const p = new google.maps.Polygon({ paths: path, strokeOpacity: 0, fillColor: '#1E5E3A', fillOpacity: 0.03, map: map, zIndex: 2 });
                                const lineSymbol = { path: 'M 0,-1 0,1', strokeOpacity: 1, scale: 3 };
                                const l = new google.maps.Polyline({ path: path, strokeOpacity: 0, icons: [{ icon: lineSymbol, offset: '0', repeat: '15px' }], strokeColor: '#1E5E3A', strokeWeight: 3, map: map, zIndex: 3 });
                                limiteElements.push(p, l);
                            });
                        });
                    }
                });
            }).catch(e => console.log('Error cargando límite:', e));

            // 2. Cargar CGM GeoJSON
            cgmLayer = new google.maps.Data();
            fetch('./CGM.geojson' + noCache).then(r => {
                if(!r.ok) throw new Error("Fallo la carga de CGM.geojson");
                return r.json();
            }).then(geoJson => {
                cgmLayer.addGeoJson(geoJson);
                
                geoJson.features.forEach(f => {
                    const cgmValue = getGeoJsonFeatureCgm(f);
                    if (cgmValue) {
                        registerCgm(cgmValue);
                    }
                });
                updateCgmDropdown();
                updateStyles(); 
            }).catch(e => {
                console.log('Aviso: CGM.geojson no cargado automáticamente (común si no se ejecuta bajo servidor CORS).');
                document.getElementById('seccion-local-uploader').classList.remove('hidden');
            });

            cgmLayer.setMap(map);

            // 3. Cargar Cortes de Pasto GeoJSON
            cortesLayer = new google.maps.Data();
            
            const procesarCortes = (geoJson) => {
                const featuresToRemove = [];
                cortesLayer.forEach(feat => featuresToRemove.push(feat));
                featuresToRemove.forEach(feat => cortesLayer.remove(feat));
                
                const sanitized = sanitizeGeoJson(geoJson);
                cortesLayer.addGeoJson(sanitized);
                
                const fechasSet = new Set();
                geoJson.features.forEach(f => {
                    if (f.properties && f.properties.Fecha_str) {
                        fechasSet.add(formatDateToShow(f.properties.Fecha_str));
                    }
                    const cgmValue = getGeoJsonFeatureCgm(f);
                    if (cgmValue) {
                        registerCgm(cgmValue);
                    }
                });
                
                updateCgmDropdown();

                const selectFecha = document.getElementById('filtro-fecha');
                const selectedVal = selectFecha.value;
                selectFecha.innerHTML = '<option value="TODAS">TODAS LAS FECHAS</option>';
                
                const sortedFechas = Array.from(fechasSet).sort((a, b) => {
                    const d1 = parseDateCustom(a);
                    const d2 = parseDateCustom(b);
                    if (!d1) return 1;
                    if (!d2) return -1;
                    return d1 - d2;
                });

                sortedFechas.forEach(fecha => {
                    if(fecha !== '-') {
                        const opt = document.createElement('option');
                        opt.value = fecha; 
                        opt.textContent = fecha;
                        selectFecha.appendChild(opt);
                    }
                });
                
                if (fechasSet.has(selectedVal)) {
                    selectFecha.value = selectedVal;
                } else {
                    selectFecha.value = "TODAS";
                }

                updateCortesStyles(); 
            };

            fetch('./cortedepasto.geojson' + noCache)
                .then(r => {
                    if (!r.ok) throw new Error("Fallo el fetch remoto");
                    return r.json();
                })
                .then(procesarCortes)
                .catch(e => {
                    console.log('cortedepasto.geojson no cargado automáticamente. Activando cargador manual.');
                    document.getElementById('seccion-local-uploader').classList.remove('hidden');
                });

            cortesLayer.setMap(map);


            // 4. Cargar Barrido GeoJSON (ZONAS BARRENDEROS MAYO 2026.geojson)
            barridoLayer = new google.maps.Data();

            const procesarBarrido = (geoJson) => {
                const featuresToRemove = [];
                barridoLayer.forEach(feat => featuresToRemove.push(feat));
                featuresToRemove.forEach(feat => barridoLayer.remove(feat));

                const sanitized = sanitizeGeoJson(geoJson);
                barridoLayer.addGeoJson(sanitized);

                // Almacenar globalmente para actualización dinámica de barrenderos según CGM
                barridoGeoJsonData = geoJson;

                // Registra los CGMs presentes en los datos de barrido
                geoJson.features.forEach(f => {
                    const cgmValue = getGeoJsonFeatureCgm(f);
                    if (cgmValue) {
                        registerCgm(cgmValue);
                    }
                });

                updateCgmDropdown();
                updateBarrenderoDropdown(); // Carga de forma filtrada por el CGM activo
                updateBarridoStyles();
            };

            fetch('./ZONAS BARRENDEROS MAYO 2026.geojson' + noCache)
                .then(r => {
                    if (!r.ok) throw new Error("Fallo el fetch remoto de Barrido");
                    return r.json();
                })
                .then(procesarBarrido)
                .catch(e => {
                    console.log('ZONAS BARRENDEROS MAYO 2026.geojson no cargado automáticamente. Activando cargador manual.');
                    document.getElementById('seccion-local-uploader').classList.remove('hidden');
                });

            barridoLayer.setMap(map);


            // 5. Cargar Zonas Barrido Covelia GeoJSON (Zonificacion Barrido Covelia.geojson)
            coveliaLayer = new google.maps.Data();

            const procesarCovelia = (geoJson) => {
                const featuresToRemove = [];
                coveliaLayer.forEach(feat => featuresToRemove.push(feat));
                featuresToRemove.forEach(feat => coveliaLayer.remove(feat));

                const sanitized = sanitizeGeoJson(geoJson);
                coveliaLayer.addGeoJson(sanitized);

                geoJson.features.forEach(f => {
                    const cgmValue = getGeoJsonFeatureCgm(f);
                    if (cgmValue) {
                        registerCgm(cgmValue);
                    }
                });

                updateCgmDropdown();
                updateCoveliaStyles();
            };

            fetch('./Zonificacion Barrido Covelia.geojson' + noCache)
                .then(r => {
                    if (!r.ok) throw new Error("Fallo el fetch remoto de Covelia");
                    return r.json();
                })
                .then(procesarCovelia)
                .catch(e => {
                    console.log('Zonificacion Barrido Covelia.geojson no cargado automáticamente. Activando cargador manual.');
                    document.getElementById('seccion-local-uploader').classList.remove('hidden');
                });

            coveliaLayer.setMap(map);


            // 6. Cargar Covelia Recoleccion GeoJSON (Zonas Covelia Recoleccion.geojson)
            recoleccionLayer = new google.maps.Data();

            const procesarRecoleccion = (geoJson) => {
                const featuresToRemove = [];
                recoleccionLayer.forEach(feat => featuresToRemove.push(feat));
                featuresToRemove.forEach(feat => recoleccionLayer.remove(feat));

                const sanitized = sanitizeGeoJson(geoJson);
                recoleccionLayer.addGeoJson(sanitized);

                recoleccionGeoJsonData = geoJson;

                const turnosSet = new Set();
                geoJson.features.forEach(f => {
                    if (f.properties && f.properties.TURNO) {
                        turnosSet.add(f.properties.TURNO.trim());
                    }
                    const cgmValue = getGeoJsonFeatureCgm(f);
                    if (cgmValue) {
                        registerCgm(cgmValue);
                    }
                });

                updateCgmDropdown();

                const selectTurno = document.getElementById('filtro-recoleccion-turno');
                if (selectTurno) {
                    const selectedVal = selectTurno.value;
                    selectTurno.innerHTML = '<option value="TODOS">TODOS LOS TURNOS</option>';
                    const sortedTurnos = Array.from(turnosSet).sort();
                    sortedTurnos.forEach(turno => {
                        const opt = document.createElement('option');
                        opt.value = turno;
                        opt.textContent = turno;
                        selectTurno.appendChild(opt);
                    });

                    if (turnosSet.has(selectedVal)) {
                        selectTurno.value = selectedVal;
                    } else {
                        selectTurno.value = "TODOS";
                    }
                }

                updateRecoleccionStyles();
            };

            fetch('./Zonas Covelia Recoleccion.geojson' + noCache)
                .then(r => {
                    if (!r.ok) throw new Error("Fallo el fetch remoto de Recoleccion");
                    return r.json();
                })
                .then(procesarRecoleccion)
                .catch(e => {
                    console.log('Zonas Covelia Recoleccion.geojson no cargado automáticamente. Activando cargador manual.');
                    document.getElementById('seccion-local-uploader').classList.remove('hidden');
                });

            recoleccionLayer.setMap(map);


            // --- EVENTO DE CARGA DE ARCHIVO MANUAL INTELIGENTE ---
            const loadGeoJsonData = (geoJson) => {
                const name = (geoJson.name || "").toLowerCase();
                const isCgm = name.includes("cgm") || geoJson.features.some(f => f.geometry && (f.geometry.type === 'Polygon' || f.geometry.type === 'MultiPolygon') && !f.properties.Fecha_str && !f.properties.BARRENDERO && !f.properties.Ruta && !f.properties.RUTA);
                const isBarrido = name.includes("barrendero") || name.includes("barrido") || geoJson.features.some(f => f.properties && f.properties.BARRENDERO);
                const isCovelia = name.includes("covelia") || geoJson.features.some(f => f.properties && f.properties.Ruta);
                const isRecoleccion = name.includes("recoleccion") || geoJson.features.some(f => f.properties && f.properties.RUTA);
                
                if (isCgm) {
                    const featuresToRemoveCgm = [];
                    cgmLayer.forEach(feat => featuresToRemoveCgm.push(feat));
                    featuresToRemoveCgm.forEach(feat => cgmLayer.remove(feat));

                    cgmLayer.addGeoJson(geoJson);
                    geoJson.features.forEach(f => {
                        const cgmValue = getGeoJsonFeatureCgm(f);
                        if (cgmValue) {
                            registerCgm(cgmValue);
                        }
                    });
                    updateCgmDropdown();
                    updateStyles();
                    console.log("CGM.geojson cargado manualmente de forma exitosa.");
                } else if (isBarrido) {
                    procesarBarrido(geoJson);
                    console.log("ZONAS BARRENDEROS MAYO 2026.geojson cargado manualmente de forma exitosa.");
                } else if (isCovelia) {
                    procesarCovelia(geoJson);
                    console.log("Zonificacion Barrido Covelia.geojson cargado manualmente de forma exitosa.");
                } else if (isRecoleccion) {
                    procesarRecoleccion(geoJson);
                    console.log("Zonas Covelia Recoleccion.geojson cargado manualmente de forma exitosa.");
                } else {
                    procesarCortes(geoJson);
                    console.log("cortedepasto.geojson cargado manualmente de forma exitosa.");
                }
            };

            document.getElementById('input-geojson-local').addEventListener('change', function(e) {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        try {
                            const geoJson = JSON.parse(evt.target.result);
                            loadGeoJsonData(geoJson);
                        } catch(err) {
                            console.error("Error al parsear el archivo GeoJSON:", err);
                        }
                    };
                    reader.readAsText(file);
                });
            });

            // --- FUNCIONES DE ESTILOS Y FILTROS ---
            function updateStyles() {
                const globalCgmSelect = document.getElementById('filtro-global-cgm');
                const globalCgm = globalCgmSelect ? globalCgmSelect.value : "TODOS";

                cgmLayer.setStyle((feature) => {
                    const featCgm = getFeatureCgmProperty(feature);
                    const cleanFeatCgm = normalizeCgmName(featCgm);
                    let isVisible = true;
                    let opacidad = 0.25;
                    let grosor = 3;

                    if (globalCgm !== "TODOS") {
                        if (cleanFeatCgm !== globalCgm) {
                            isVisible = false; 
                        } else {
                            opacidad = 0.4; 
                            grosor = 4;
                        }
                    }

                    return {
                        fillColor: '#86EFAC', 
                        fillOpacity: opacidad, 
                        strokeColor: '#1E5E3A', 
                        strokeWeight: grosor,        
                        strokeOpacity: 0.9, 
                        zIndex: 1,
                        visible: isVisible
                    };
                });
            }

            function updateCortesStyles() {
                const globalCgmSelect = document.getElementById('filtro-global-cgm');
                const globalCgm = globalCgmSelect ? globalCgmSelect.value : "TODOS";
                
                const fechaSelect = document.getElementById('filtro-fecha');
                const fechaFiltro = fechaSelect ? fechaSelect.value : "TODAS";

                cortesLayer.setStyle((feature) => {
                    const featCgm = getFeatureCgmProperty(feature);
                    const cleanFeatCgm = normalizeCgmName(featCgm);
                    const featFechaOriginal = feature.getProperty('Fecha_str'); 
                    const featFechaClean = formatDateToShow(featFechaOriginal);
                    const dynamicDayColor = getColorPorDiaSemana(featFechaOriginal); 
                    let isVisible = true;

                    // Filtro Global CGM
                    if (globalCgm !== "TODOS") {
                        if (cleanFeatCgm !== globalCgm) {
                            isVisible = false;
                        }
                    }

                    // Filtro de Fecha
                    if (fechaFiltro !== "TODAS") {
                        if (featFechaClean !== fechaFiltro) {
                            isVisible = false;
                        }
                    }

                    const geomType = feature.getGeometry() ? feature.getGeometry().getType() : '';

                    if (geomType === 'Point') {
                        const nombreRaw = feature.getProperty('Inicio Recorrido') || feature.getProperty('PLAZA') || feature.getProperty('NOMBRE') || '';
                        const nombreUpper = nombreRaw.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
                        
                        let type = 'PLAZA';
                        if (nombreUpper.includes('ESCUELA') || nombreUpper.includes('COLEGIO') || nombreUpper.includes('JARDIN') || nombreUpper.includes('FORMACION') || nombreUpper.includes('TECNICA') || nombreUpper.includes('PRIMARIA') || nombreUpper.includes('SECUNDARIA')) {
                            type = 'ESCUELA';
                        } else if (nombreUpper.includes('POLIDEPORTIVO') || nombreUpper.includes('CLUB') || nombreUpper.includes('PREDIO') || nombreUpper.includes('DOTA')) {
                            type = 'POLIDEPORTIVO';
                        }

                        return {
                            icon: getCustomIcon(type, dynamicDayColor),
                            zIndex: 6,
                            visible: isVisible
                        };
                    } else {
                        // Línea o Polígono
                        return {
                            fillColor: dynamicDayColor,
                            fillOpacity: 0.6,
                            strokeColor: dynamicDayColor,
                            strokeWeight: 4, 
                            zIndex: 5,
                            visible: isVisible
                        };
                    }
                });
            }

            function updateBarridoStyles() {
                const globalCgmSelect = document.getElementById('filtro-global-cgm');
                const globalCgm = globalCgmSelect ? globalCgmSelect.value : "TODOS";

                const barrenderoSelect = document.getElementById('filtro-barrendero');
                const barrenderoFiltro = barrenderoSelect ? barrenderoSelect.value : "TODOS";

                barridoLayer.setStyle((feature) => {
                    const featCgm = getFeatureCgmProperty(feature);
                    const cleanFeatCgm = normalizeCgmName(featCgm);
                    const featBarrendero = feature.getProperty('BARRENDERO') ? feature.getProperty('BARRENDERO').trim() : "";
                    let isVisible = true;

                    // Filtro Global CGM
                    if (globalCgm !== "TODOS") {
                        if (cleanFeatCgm !== globalCgm) {
                            isVisible = false;
                        }
                    }

                    // Filtro específico de Barrendero
                    if (barrenderoFiltro !== "TODOS") {
                        if (featBarrendero !== barrenderoFiltro) {
                            isVisible = false;
                        }
                    }

                    return {
                        strokeColor: 'var(--color-barrido)',
                        strokeWeight: 5,
                        strokeOpacity: 0.85,
                        zIndex: 4,
                        visible: isVisible
                    };
                });
            }

            function updateCoveliaStyles() {
                const globalCgmSelect = document.getElementById('filtro-global-cgm');
                const globalCgm = globalCgmSelect ? globalCgmSelect.value : "TODOS";

                coveliaLayer.setStyle((feature) => {
                    const featCgm = getFeatureCgmProperty(feature);
                    const cleanFeatCgm = normalizeCgmName(featCgm);
                    let isVisible = true;

                    // Filtro Global CGM aplicado a Covelia
                    if (globalCgm !== "TODOS") {
                        if (cleanFeatCgm !== globalCgm) {
                            isVisible = false;
                        }
                    }

                    return {
                        strokeColor: 'var(--color-covelia)',
                        strokeWeight: 4,
                        strokeOpacity: 0.9,
                        zIndex: 3,
                        visible: isVisible
                    };
                });
            }

            function updateRecoleccionStyles() {
                const globalCgmSelect = document.getElementById('filtro-global-cgm');
                const globalCgm = globalCgmSelect ? globalCgmSelect.value : "TODOS";

                const turnoSelect = document.getElementById('filtro-recoleccion-turno');
                const turnoFiltro = turnoSelect ? turnoSelect.value : "TODOS";

                recoleccionLayer.setStyle((feature) => {
                    const featCgm = getFeatureCgmProperty(feature);
                    const cleanFeatCgm = normalizeCgmName(featCgm);
                    const featTurno = feature.getProperty('TURNO') ? feature.getProperty('TURNO').trim() : "";
                    let isVisible = true;

                    // Filtro Global CGM aplicado si el registro tiene CGM especificado
                    if (globalCgm !== "TODOS" && cleanFeatCgm) {
                        if (cleanFeatCgm !== globalCgm) {
                            isVisible = false;
                        }
                    }

                    // Filtro específico de Turno
                    if (turnoFiltro !== "TODOS") {
                        if (featTurno !== turnoFiltro) {
                            isVisible = false;
                        }
                    }

                    return {
                        fillColor: 'var(--color-recoleccion)',
                        fillOpacity: 0.2,
                        strokeColor: 'var(--color-recoleccion)',
                        strokeWeight: 2,
                        strokeOpacity: 0.85,
                        zIndex: 3,
                        visible: isVisible
                    };
                });
            }

            // Ventanas Emergentes base para CGM, Cortes, Barrido, Covelia y Recoleccion
            function bindPopup(layer, colorTitle, layerType = 'cgm') {
                layer.addListener('click', function(event) {
                    let content = `<div style="font-family: 'Montserrat', sans-serif; min-width: 200px; position: relative;">`;
                    content += `<button onclick="window.closeInfoWindow()" class="custom-close-btn">&times;</button>`;
                    
                    if (layerType === 'corte') {
                        const geomType = event.feature.getGeometry() ? event.feature.getGeometry().getType() : '';
                        const fechaCorteOriginal = event.feature.getProperty('Fecha_str');
                        const fechaCorteClean = formatDateToShow(fechaCorteOriginal);
                        const dynamicDayColor = getColorPorDiaSemana(fechaCorteOriginal);
                        
                        if (geomType === 'Point') {
                            const nombreRaw = event.feature.getProperty('Inicio Recorrido') || event.feature.getProperty('PLAZA') || event.feature.getProperty('NOMBRE') || 'Lugar de Interés';
                            const nombreUpper = nombreRaw.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
                            
                            let colorDin = '#84CC16';
                            let tipoLabel = 'Corte en Plaza / Parque';
                            
                            if (nombreUpper.includes('ESCUELA') || nombreUpper.includes('COLEGIO') || nombreUpper.includes('JARDIN') || nombreUpper.includes('FORMACION') || nombreUpper.includes('TECNICA') || nombreUpper.includes('PRIMARIA') || nombreUpper.includes('SECUNDARIA')) { 
                                colorDin = '#F59E0B'; 
                                tipoLabel = 'Corte en Institución Educativa'; 
                            }
                            else if (nombreUpper.includes('POLIDEPORTIVO') || nombreUpper.includes('CLUB') || nombreUpper.includes('PREDIO') || nombreUpper.includes('DOTA')) { 
                                colorDin = '#0EA5E9'; 
                                tipoLabel = 'Corte en Deporte / Predio / Polideportivo'; 
                            }

                            content += `<h3 style="font-weight: 800; font-size: 14px; color: ${colorDin}; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">${tipoLabel}</h3>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Nombre:</b> ${nombreRaw}</p>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Fecha:</b> ${fechaCorteClean}</p>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${getFeatureCgmProperty(event.feature) || '-'}</p>`;
                            
                            const localidad = event.feature.getProperty('Localidad');
                            if (localidad) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Localidad:</b> ${localidad}</p>`;
                            }
                            const ubicacion = event.feature.getProperty('UBICACION') || event.feature.getProperty('DIRECCION');
                            if (ubicacion) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Ubicación:</b> ${ubicacion}</p>`;
                            }
                        } else {
                            // Líneas o Polígonos de Corte
                            content += `<h3 style="font-weight: 800; font-size: 14px; color: ${dynamicDayColor}; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">Recorrido de Corte</h3>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Fecha:</b> ${fechaCorteClean}</p>`;
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${getFeatureCgmProperty(event.feature) || '-'}</p>`;
                            
                            const localidad = event.feature.getProperty('Localidad');
                            if (localidad) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Localidad:</b> ${localidad}</p>`;
                            }
                            if(event.feature.getProperty('Inicio Recorrido')) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Inicio:</b> ${event.feature.getProperty('Inicio Recorrido')}</p>`;
                            }
                            if(event.feature.getProperty('Fin del Recorrido')) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Fin:</b> ${event.feature.getProperty('Fin del Recorrido')}</p>`;
                            }
                            
                            const distancia = event.feature.getProperty('Distancia');
                            if(distancia && distancia > 0) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Distancia:</b> ${distancia} m</p>`;
                            }
                            const area = event.feature.getProperty('Area');
                            if(area && area > 0) {
                                content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Área:</b> ${area} m²</p>`;
                            }
                        }
                    } else if (layerType === 'barrido') {
                        // Información de Barrido Municipal
                        content += `<h3 style="font-weight: 800; font-size: 14px; color: var(--color-barrido); border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">Barrido</h3>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Calle:</b> ${event.feature.getProperty('CALLE') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Barrendero:</b> ${event.feature.getProperty('BARRENDERO') || '-'}</p>`;
                        
                        const legajo = event.feature.getProperty('LEGAJO/DNI');
                        if (legajo !== undefined && legajo !== null && legajo !== "") {
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Legajo:</b> ${legajo}</p>`;
                        }
                        
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${getFeatureCgmProperty(event.feature) || '-'}</p>`;

                    } else if (layerType === 'covelia') {
                        // Información de Zonas Covelia (Nuevos datos de línea)
                        const ruta = event.feature.getProperty('Ruta') || '-';
                        content += `<h3 style="font-weight: 800; font-size: 14px; color: var(--color-covelia); border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">Barrido Covelia - Ruta ${ruta}</h3>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${getFeatureCgmProperty(event.feature) || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Turno:</b> ${event.feature.getProperty('Turno') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Frecuencia:</b> ${event.feature.getProperty('Frecuencia') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Horario:</b> ${event.feature.getProperty('Horario') || '-'}</p>`;
                        const metros = event.feature.getProperty('Metros');
                        if (metros) {
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Extensión:</b> ${metros} m</p>`;
                        }
                    } else if (layerType === 'recoleccion') {
                        // Información de Recolección Covelia
                        const ruta = event.feature.getProperty('RUTA') || '-';
                        content += `<h3 style="font-weight: 800; font-size: 14px; color: var(--color-recoleccion); border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">Recolección Covelia - Ruta ${ruta}</h3>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Frecuencia semanal:</b> ${event.feature.getProperty('FRECUENCIA') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Turno:</b> ${event.feature.getProperty('TURNO') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Horario:</b> ${event.feature.getProperty('INICIO_T') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Días:</b> ${event.feature.getProperty('DIAS') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Zona interna:</b> ${event.feature.getProperty('ZONA') || '-'}</p>`;
                        const cgmVal = getFeatureCgmProperty(event.feature);
                        if (cgmVal) {
                            content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>CGM:</b> ${cgmVal}</p>`;
                        }
                    } else { // CGM
                        content += `<h3 style="font-weight: 800; font-size: 14px; color: ${colorTitle}; border-bottom: 1px solid #E6EDF3; padding-bottom: 4px; margin-bottom: 8px; padding-right: 20px;">CGM: ${getFeatureCgmProperty(event.feature)}</h3>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Manzanas:</b> ${event.feature.getProperty('Manzanas') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Cuadras:</b> ${event.feature.getProperty('Cuadras') || '-'}</p>`;
                        content += `<p style="margin: 4px 0; font-size: 12px; color: #333;"><b>Viviendas:</b> ${event.feature.getProperty('Viviendas') || '-'}</p>`;
                    }
                    
                    content += `</div>`;
                    
                    infoWindow.setContent(content);
                    
                    if (event.feature.getGeometry().getType() === 'Point') {
                        infoWindow.setPosition(event.feature.getGeometry().get());
                    } else {
                        infoWindow.setPosition(event.latLng);
                    }
                    infoWindow.open(map);
                    startInfoWindowTimer(); 
                });
            }

            bindPopup(cgmLayer, '#2A7E43', 'cgm');
            bindPopup(cortesLayer, '#19567C', 'corte');
            bindPopup(barridoLayer, 'var(--color-barrido)', 'barrido');
            bindPopup(coveliaLayer, 'var(--color-covelia)', 'covelia');
            bindPopup(recoleccionLayer, 'var(--color-recoleccion)', 'recoleccion');

            // Toggles de Capas
            document.getElementById('cb-limite').addEventListener('change', (e) => {
                const m = e.target.checked ? map : null;
                limiteElements.forEach(el => el.setMap(m));
            });

            document.getElementById('cb-cgm').addEventListener('change', (e) => {
                e.target.checked ? cgmLayer.setMap(map) : cgmLayer.setMap(null);
            });

            document.getElementById('cb-cortes').addEventListener('change', (e) => {
                e.target.checked ? cortesLayer.setMap(map) : cortesLayer.setMap(null);
            });

            document.getElementById('cb-barrido').addEventListener('change', (e) => {
                e.target.checked ? barridoLayer.setMap(map) : barridoLayer.setMap(null);
            });

            document.getElementById('cb-covelia').addEventListener('change', (e) => {
                e.target.checked ? coveliaLayer.setMap(map) : coveliaLayer.setMap(null);
            });

            document.getElementById('cb-recoleccion').addEventListener('change', (e) => {
                e.target.checked ? recoleccionLayer.setMap(map) : recoleccionLayer.setMap(null);
            });
        }
    </script>
</body>
</html>
